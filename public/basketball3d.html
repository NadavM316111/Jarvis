<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Basketball - Street Hoops</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background: #1a1a2e; }
        
        #menu {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: white;
        }
        
        #menu h1 {
            font-size: 4em;
            color: #ff6b35;
            text-shadow: 0 0 20px rgba(255, 107, 53, 0.5);
            margin-bottom: 30px;
        }
        
        #menu input {
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            background: #0f3460;
            color: white;
            margin-bottom: 20px;
            text-align: center;
            width: 300px;
        }
        
        #menu input::placeholder { color: #666; }
        
        .player-select {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
            margin: 20px 0;
        }
        
        .player-card {
            background: #0f3460;
            border-radius: 15px;
            padding: 15px;
            width: 150px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }
        
        .player-card:hover { transform: scale(1.05); }
        .player-card.selected { border-color: #ff6b35; box-shadow: 0 0 20px rgba(255, 107, 53, 0.5); }
        
        .player-card h3 { color: #ff6b35; margin-bottom: 10px; font-size: 0.9em; }
        .player-card .stat { display: flex; justify-content: space-between; font-size: 0.8em; margin: 5px 0; }
        .player-card .stat-bar { height: 6px; background: #1a1a2e; border-radius: 3px; margin-top: 2px; }
        .player-card .stat-fill { height: 100%; background: #ff6b35; border-radius: 3px; }
        
        #startBtn {
            padding: 20px 60px;
            font-size: 1.5em;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        #startBtn:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(255, 107, 53, 0.7); }
        #startBtn:disabled { background: #444; cursor: not-allowed; transform: none; }
        
        #hud {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            padding: 20px;
            display: none;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 100;
            pointer-events: none;
        }
        
        .team-score {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
        }
        
        .team-score h2 { color: #ff6b35; font-size: 1.2em; margin-bottom: 5px; }
        .team-score .score { color: white; font-size: 3em; font-weight: bold; }
        
        #shotClock {
            background: rgba(255, 0, 0, 0.9);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-size: 2em;
            font-weight: bold;
        }
        
        #shotMeter {
            position: fixed;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            display: none;
            overflow: hidden;
            border: 2px solid white;
        }
        
        #shotMeterFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, red, yellow, green, yellow, red);
            transition: width 0.05s linear;
        }
        
        #shotMeterTarget {
            position: absolute;
            top: 0;
            left: 45%;
            width: 10%;
            height: 100%;
            background: rgba(0, 255, 0, 0.3);
            border-left: 2px solid lime;
            border-right: 2px solid lime;
        }
        
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            font-size: 0.9em;
            display: none;
        }
        
        #gameOver {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: white;
        }
        
        #gameOver h1 { font-size: 4em; color: #ff6b35; margin-bottom: 20px; }
        #gameOver p { font-size: 2em; margin-bottom: 30px; }
        #playAgain {
            padding: 20px 60px;
            font-size: 1.5em;
            background: #ff6b35;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
        }
        
        #selectedCount { color: #ff6b35; font-size: 1.2em; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>STREET HOOPS 3D</h1>
        <input type="text" id="teamName" placeholder="Enter Your Team Name" maxlength="15">
        <p id="selectedCount">Select 5 Players (0/5)</p>
        <div class="player-select" id="playerSelect"></div>
        <button id="startBtn" disabled>START GAME</button>
    </div>
    
    <div id="hud">
        <div class="team-score">
            <h2 id="yourTeamName">YOUR TEAM</h2>
            <div class="score" id="yourScore">0</div>
        </div>
        <div id="shotClock">24</div>
        <div class="team-score">
            <h2>AI BALLERS</h2>
            <div class="score" id="aiScore">0</div>
        </div>
    </div>
    
    <div id="shotMeter">
        <div id="shotMeterTarget"></div>
        <div id="shotMeterFill"></div>
    </div>
    
    <div id="controls">
        WASD: Move | SPACE: Shoot/Block | E: Pass | SHIFT: Sprint | Mouse: Look
    </div>
    
    <div id="gameOver">
        <h1 id="winnerText">YOU WIN!</h1>
        <p id="finalScore">10 - 8</p>
        <button id="playAgain">PLAY AGAIN</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Available players
        const availablePlayers = [
            { name: "Flash", speed: 95, shooting: 70, defense: 60, color: 0xff0000 },
            { name: "Tank", speed: 50, shooting: 65, defense: 95, color: 0x0000ff },
            { name: "Sniper", speed: 60, shooting: 95, defense: 55, color: 0x00ff00 },
            { name: "Ghost", speed: 85, shooting: 75, defense: 70, color: 0xffffff },
            { name: "Beast", speed: 70, shooting: 60, defense: 90, color: 0x800080 },
            { name: "Smooth", speed: 75, shooting: 85, defense: 65, color: 0xffa500 },
            { name: "Ice", speed: 65, shooting: 90, defense: 60, color: 0x00ffff },
            { name: "Thunder", speed: 80, shooting: 70, defense: 75, color: 0xffff00 },
            { name: "Shadow", speed: 90, shooting: 65, defense: 70, color: 0x333333 },
            { name: "Ace", speed: 75, shooting: 80, defense: 75, color: 0xff69b4 }
        ];
        
        let selectedPlayers = [];
        let teamName = "MY TEAM";
        
        // Create player cards
        const playerSelect = document.getElementById('playerSelect');
        availablePlayers.forEach((player, index) => {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.innerHTML = `
                <h3>${player.name}</h3>
                <div class="stat">
                    <span>Speed</span><span>${player.speed}</span>
                </div>
                <div class="stat-bar"><div class="stat-fill" style="width:${player.speed}%"></div></div>
                <div class="stat">
                    <span>Shooting</span><span>${player.shooting}</span>
                </div>
                <div class="stat-bar"><div class="stat-fill" style="width:${player.shooting}%"></div></div>
                <div class="stat">
                    <span>Defense</span><span>${player.defense}</span>
                </div>
                <div class="stat-bar"><div class="stat-fill" style="width:${player.defense}%"></div></div>
            `;
            card.onclick = () => togglePlayer(index, card);
            playerSelect.appendChild(card);
        });
        
        function togglePlayer(index, card) {
            const idx = selectedPlayers.indexOf(index);
            if (idx > -1) {
                selectedPlayers.splice(idx, 1);
                card.classList.remove('selected');
            } else if (selectedPlayers.length < 5) {
                selectedPlayers.push(index);
                card.classList.add('selected');
            }
            document.getElementById('selectedCount').textContent = `Select 5 Players (${selectedPlayers.length}/5)`;
            document.getElementById('startBtn').disabled = selectedPlayers.length !== 5;
        }
        
        document.getElementById('startBtn').onclick = startGame;
        document.getElementById('playAgain').onclick = () => location.reload();
        
        // Three.js setup
        let scene, camera, renderer;
        let players = [], aiPlayers = [];
        let ball, court;
        let yourScore = 0, aiScore = 0;
        let shotClock = 24;
        let hasBall = true;
        let isShooting = false;
        let shotPower = 0;
        let controlledPlayer = null;
        let keys = {};
        let mouseX = 0, mouseY = 0;
        let gameStarted = false;
        let ballHolder = null;
        let audience = [];
        
        function startGame() {
            teamName = document.getElementById('teamName').value || "MY TEAM";
            document.getElementById('yourTeamName').textContent = teamName;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            document.getElementById('controls').style.display = 'block';
            
            initGame();
        }
        
        function initGame() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 50, 150);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 25);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(20, 40, 20);
            mainLight.castShadow = true;
            scene.add(mainLight);
            
            // Spotlights for arena feel
            const colors = [0xff6b35, 0x00ff00, 0x0066ff, 0xff00ff];
            for (let i = 0; i < 4; i++) {
                const spot = new THREE.SpotLight(colors[i], 0.5);
                spot.position.set(Math.cos(i * Math.PI/2) * 40, 30, Math.sin(i * Math.PI/2) * 30);
                spot.angle = 0.5;
                scene.add(spot);
            }
            
            createCourt();
            createHoops();
            createBall();
            createPlayers();
            createAudience();
            
            // Controls
            document.addEventListener('keydown', e => keys[e.code] = true);
            document.addEventListener('keyup', e => keys[e.code] = false);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', onClick);
            renderer.domElement.requestPointerLock = renderer.domElement.requestPointerLock || renderer.domElement.mozRequestPointerLock;
            renderer.domElement.onclick = () => renderer.domElement.requestPointerLock();
            
            gameStarted = true;
            ballHolder = controlledPlayer;
            
            // Shot clock
            setInterval(() => {
                if (gameStarted && shotClock > 0) {
                    shotClock--;
                    document.getElementById('shotClock').textContent = shotClock;
                    if (shotClock === 0) {
                        // Turnover
                        hasBall = !hasBall;
                        shotClock = 24;
                        ballHolder = hasBall ? controlledPlayer : aiPlayers[0];
                    }
                }
            }, 1000);
            
            animate();
        }
        
        function createCourt() {
            // Main court floor
            const courtGeo = new THREE.BoxGeometry(50, 0.5, 30);
            const courtMat = new THREE.MeshStandardMaterial({ color: 0xcd853f });
            court = new THREE.Mesh(courtGeo, courtMat);
            court.receiveShadow = true;
            scene.add(court);
            
            // Court lines
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            
            // Center circle
            const circleGeo = new THREE.RingGeometry(3, 3.2, 32);
            const circle = new THREE.Mesh(circleGeo, lineMat);
            circle.rotation.x = -Math.PI / 2;
            circle.position.y = 0.26;
            scene.add(circle);
            
            // Center line
            const centerLine = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 30), lineMat);
            centerLine.position.y = 0.3;
            scene.add(centerLine);
            
            // Three point lines
            for (let side of [-1, 1]) {
                const threePoint = new THREE.Mesh(
                    new THREE.TorusGeometry(8, 0.1, 8, 32, Math.PI),
                    lineMat
                );
                threePoint.rotation.x = -Math.PI / 2;
                threePoint.rotation.z = side > 0 ? Math.PI / 2 : -Math.PI / 2;
                threePoint.position.set(side * 22, 0.26, 0);
                scene.add(threePoint);
            }
            
            // Stands/bleachers
            const standGeo = new THREE.BoxGeometry(60, 8, 5);
            const standMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
            for (let z of [-22, 22]) {
                const stand = new THREE.Mesh(standGeo, standMat);
                stand.position.set(0, 4, z);
                scene.add(stand);
            }
        }
        
        function createHoops() {
            for (let side of [-1, 1]) {
                // Backboard
                const backboard = new THREE.Mesh(
                    new THREE.BoxGeometry(4, 3, 0.2),
                    new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 })
                );
                backboard.position.set(side * 24, 5, 0);
                scene.add(backboard);
                
                // Rim
                const rim = new THREE.Mesh(
                    new THREE.TorusGeometry(0.75, 0.08, 8, 16),
                    new THREE.MeshStandardMaterial({ color: 0xff4500 })
                );
                rim.rotation.x = Math.PI / 2;
                rim.position.set(side * 22.5, 4, 0);
                scene.add(rim);
                
                // Net (simple)
                const netGeo = new THREE.CylinderGeometry(0.75, 0.5, 1.5, 8, 1, true);
                const netMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
                const net = new THREE.Mesh(netGeo, netMat);
                net.position.set(side * 22.5, 3, 0);
                scene.add(net);
                
                // Pole
                const pole = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.2, 0.2, 6),
                    new THREE.MeshStandardMaterial({ color: 0x333333 })
                );
                pole.position.set(side * 25, 3, 0);
                scene.add(pole);
            }
        }
        
        function createBall() {
            const ballGeo = new THREE.SphereGeometry(0.4, 16, 16);
            const ballMat = new THREE.MeshStandardMaterial({ color: 0xff6600 });
            ball = new THREE.Mesh(ballGeo, ballMat);
            ball.castShadow = true;
            ball.position.set(0, 1.5, 0);
            ball.velocity = new THREE.Vector3();
            ball.isFlying = false;
            scene.add(ball);
        }
        
        function createPlayer(x, z, stats, isAI) {
            const group = new THREE.Group();
            const color = stats.color;
            
            // Body
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.4, 0.3, 1.2, 8),
                new THREE.MeshStandardMaterial({ color: isAI ? 0xff0000 : color })
            );
            body.position.y = 1.8;
            group.add(body);
            
            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.35, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xffcc99 })
            );
            head.position.y = 2.7;
            group.add(head);
            
            // Arms
            for (let side of [-1, 1]) {
                const arm = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.1, 0.1, 0.8, 8),
                    new THREE.MeshStandardMaterial({ color: 0xffcc99 })
                );
                arm.position.set(side * 0.5, 2, 0);
                arm.rotation.z = side * 0.3;
                group.add(arm);
            }
            
            // Legs
            for (let side of [-1, 1]) {
                const leg = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.15, 0.12, 1, 8),
                    new THREE.MeshStandardMaterial({ color: isAI ? 0x990000 : 0x333333 })
                );
                leg.position.set(side * 0.2, 0.6, 0);
                group.add(leg);
            }
            
            // Shoes
            for (let side of [-1, 1]) {
                const shoe = new THREE.Mesh(
                    new THREE.BoxGeometry(0.25, 0.15, 0.4),
                    new THREE.MeshStandardMaterial({ color: 0x111111 })
                );
                shoe.position.set(side * 0.2, 0.08, 0.1);
                group.add(shoe);
            }
            
            // Number on back
            group.position.set(x, 0, z);
            group.stats = stats;
            group.isAI = isAI;
            group.targetPos = new THREE.Vector3(x, 0, z);
            group.castShadow = true;
            
            scene.add(group);
            return group;
        }
        
        function createPlayers() {
            // Your team
            const positions = [
                { x: -5, z: 0 },
                { x: -8, z: 5 },
                { x: -8, z: -5 },
                { x: -12, z: 8 },
                { x: -12, z: -8 }
            ];
            
            selectedPlayers.forEach((idx, i) => {
                const p = createPlayer(positions[i].x, positions[i].z, availablePlayers[idx], false);
                players.push(p);
            });
            
            controlledPlayer = players[0];
            
            // AI team
            const aiPositions = [
                { x: 5, z: 0 },
                { x: 8, z: 5 },
                { x: 8, z: -5 },
                { x: 12, z: 8 },
                { x: 12, z: -8 }
            ];
            
            const aiStats = [
                { name: "AI-Alpha", speed: 75, shooting: 80, defense: 75, color: 0xff0000 },
                { name: "AI-Beta", speed: 80, shooting: 70, defense: 70, color: 0xff0000 },
                { name: "AI-Gamma", speed: 70, shooting: 85, defense: 65, color: 0xff0000 },
                { name: "AI-Delta", speed: 85, shooting: 65, defense: 75, color: 0xff0000 },
                { name: "AI-Omega", speed: 65, shooting: 75, defense: 85, color: 0xff0000 }
            ];
            
            aiStats.forEach((stats, i) => {
                const p = createPlayer(aiPositions[i].x, aiPositions[i].z, stats, true);
                aiPlayers.push(p);
            });
        }
        
        function createAudience() {
            // Create audience members in the stands
            for (let z of [-20, 20]) {
                for (let x = -25; x <= 25; x += 3) {
                    for (let row = 0; row < 3; row++) {
                        const person = new THREE.Group();
                        
                        // Body
                        const body = new THREE.Mesh(
                            new THREE.BoxGeometry(0.6, 0.8, 0.4),
                            new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff })
                        );
                        body.position.y = 0.4;
                        person.add(body);
                        
                        // Head
                        const head = new THREE.Mesh(
                            new THREE.SphereGeometry(0.25, 8, 8),
                            new THREE.MeshStandardMaterial({ color: 0xffcc99 })
                        );
                        head.position.y = 1;
                        person.add(head);
                        
                        person.position.set(
                            x + Math.random() * 2 - 1,
                            1 + row * 2,
                            z + (z > 0 ? -row : row)
                        );
                        
                        scene.add(person);
                        audience.push(person);
                    }
                }
            }
        }
        
        function onMouseMove(e) {
            if (document.pointerLockElement) {
                mouseX += e.movementX * 0.002;
                mouseY = Math.max(-1, Math.min(1, mouseY + e.movementY * 0.002));
            }
        }
        
        function onClick() {
            if (!gameStarted) return;
            
            if (hasBall && ballHolder === controlledPlayer && !ball.isFlying) {
                // Start shooting
                isShooting = true;
                shotPower = 0;
                document.getElementById('shotMeter').style.display = 'block';
                
                const shootInterval = setInterval(() => {
                    if (isShooting) {
                        shotPower += 2;
                        document.getElementById('shotMeterFill').style.width = (shotPower % 100) + '%';
                        if (shotPower >= 100) shotPower = 0;
                    }
                }, 20);
                
                const release = () => {
                    if (isShooting) {
                        isShooting = false;
                        clearInterval(shootInterval);
                        document.getElementById('shotMeter').style.display = 'none';
                        shoot(shotPower);
                    }
                    document.removeEventListener('click', release);
                };
                
                setTimeout(() => {
                    document.addEventListener('click', release);
                }, 100);
            }
        }
        
        function shoot(power) {
            const accuracy = Math.abs(50 - power);
            const playerShooting = controlledPlayer.stats.shooting;
            
            // Calculate shot direction towards hoop
            const hoopPos = new THREE.Vector3(22.5, 4, 0);
            const direction = hoopPos.clone().sub(ball.position).normalize();
            
            // Add randomness based on accuracy and player skill
            const missAmount = (accuracy / 50) * (1 - playerShooting / 100) * 3;
            direction.x += (Math.random() - 0.5) * missAmount;
            direction.y += (Math.random() - 0.5) * missAmount * 0.5;
            direction.z += (Math.random() - 0.5) * missAmount;
            
            const distance = ball.position.distanceTo(hoopPos);
            const shootPower = Math.min(distance / 15, 1) * 0.5 + 0.3;
            
            ball.velocity.set(
                direction.x * shootPower,
                0.4 + (distance / 50),
                direction.z * shootPower * 0.3
            );
            
            ball.isFlying = true;
            ballHolder = null;
        }
        
        function updateBall() {
            if (ball.isFlying) {
                ball.position.add(ball.velocity);
                ball.velocity.y -= 0.015; // Gravity
                
                // Check if scored
                const hoopPos = new THREE.Vector3(hasBall ? 22.5 : -22.5, 4, 0);
                const distToHoop = ball.position.distanceTo(hoopPos);
                
                if (distToHoop < 1 && ball.velocity.y < 0 && ball.position.y < 4.5 && ball.position.y > 3) {
                    // SCORE!
                    const points = ball.position.distanceTo(new THREE.Vector3(hasBall ? 22.5 : -22.5, 0, 0)) > 8 ? 3 : 2;
                    if (hasBall) {
                        yourScore += points;
                        document.getElementById('yourScore').textContent = yourScore;
                    } else {
                        aiScore += points;
                        document.getElementById('aiScore').textContent = aiScore;
                    }
                    
                    // Check for win
                    if (yourScore >= 10 || aiScore >= 10) {
                        endGame();
                        return;
                    }
                    
                    resetPossession(!hasBall);
                }
                
                // Ball hits ground
                if (ball.position.y < 0.5) {
                    ball.position.y = 0.5;
                    ball.velocity.y *= -0.5;
                    ball.velocity.x *= 0.8;
                    ball.velocity.z *= 0.8;
                    
                    if (Math.abs(ball.velocity.y) < 0.05) {
                        ball.isFlying = false;
                        // Closest player gets ball
                        let closest = null;
                        let closestDist = Infinity;
                        [...players, ...aiPlayers].forEach(p => {
                            const d = p.position.distanceTo(ball.position);
                            if (d < closestDist) {
                                closestDist = d;
                                closest = p;
                            }
                        });
                        if (closest) {
                            ballHolder = closest;
                            hasBall = !closest.isAI;
                            shotClock = 24;
                        }
                    }
                }
                
                // Out of bounds
                if (Math.abs(ball.position.x) > 26 || Math.abs(ball.position.z) > 16) {
                    resetPossession(!hasBall);
                }
            } else if (ballHolder) {
                // Ball follows holder
                ball.position.set(
                    ballHolder.position.x + Math.sin(ballHolder.rotation.y) * 0.8,
                    1.5,
                    ballHolder.position.z + Math.cos(ballHolder.rotation.y) * 0.8
                );
            }
        }
        
        function resetPossession(yourBall) {
            hasBall = yourBall;
            shotClock = 24;
            ball.isFlying = false;
            ball.velocity.set(0, 0, 0);
            
            if (yourBall) {
                ballHolder = controlledPlayer;
                controlledPlayer.position.set(-20, 0, 0);
            } else {
                ballHolder = aiPlayers[0];
                aiPlayers[0].position.set(20, 0, 0);
            }
            
            ball.position.set(ballHolder.position.x, 1.5, ballHolder.position.z);
        }
        
        function updatePlayerMovement() {
            if (!controlledPlayer) return;
            
            const speed = (controlledPlayer.stats.speed / 100) * 0.15 * (keys['ShiftLeft'] ? 1.5 : 1);
            const moveDir = new THREE.Vector3();
            
            if (keys['KeyW']) moveDir.z -= 1;
            if (keys['KeyS']) moveDir.z += 1;
            if (keys['KeyA']) moveDir.x -= 1;
            if (keys['KeyD']) moveDir.x += 1;
            
            if (moveDir.length() > 0) {
                moveDir.normalize();
                // Rotate movement by camera angle
                const angle = mouseX;
                const rotatedX = moveDir.x * Math.cos(angle) - moveDir.z * Math.sin(angle);
                const rotatedZ = moveDir.x * Math.sin(angle) + moveDir.z * Math.cos(angle);
                
                controlledPlayer.position.x += rotatedX * speed;
                controlledPlayer.position.z += rotatedZ * speed;
                
                // Clamp to court
                controlledPlayer.position.x = Math.max(-24, Math.min(24, controlledPlayer.position.x));
                controlledPlayer.position.z = Math.max(-14, Math.min(14, controlledPlayer.position.z));
            }
            
            // Player rotation follows mouse
            controlledPlayer.rotation.y = mouseX;
            
            // Pass with E
            if (keys['KeyE'] && hasBall && ballHolder === controlledPlayer && !ball.isFlying) {
                // Find closest teammate
                let closest = null;
                let closestDist = Infinity;
                players.forEach(p => {
                    if (p !== controlledPlayer) {
                        const d = p.position.distanceTo(controlledPlayer.position);
                        if (d < closestDist) {
                            closestDist = d;
                            closest = p;
                        }
                    }
                });
                if (closest) {
                    const dir = closest.position.clone().sub(ball.position).normalize();
                    ball.velocity.copy(dir.multiplyScalar(0.5));
                    ball.velocity.y = 0.1;
                    ball.isFlying = true;
                    ballHolder = null;
                }
                keys['KeyE'] = false;
            }
        }
        
        function updateAI() {
            aiPlayers.forEach((ai, index) => {
                const speed = (ai.stats.speed / 100) * 0.08;
                
                if (!hasBall && ballHolder === ai) {
                    // AI has ball - try to score
                    const hoopPos = new THREE.Vector3(-22.5, 0, 0);
                    const distToHoop = ai.position.distanceTo(hoopPos);
                    
                    if (distToHoop < 10 && Math.random() < 0.02) {
                        // Shoot
                        const accuracy = ai.stats.shooting;
                        const hoopTarget = new THREE.Vector3(-22.5, 4, 0);
                        const direction = hoopTarget.clone().sub(ball.position).normalize();
                        
                        const missAmount = (1 - accuracy / 100) * 2;
                        direction.x += (Math.random() - 0.5) * missAmount;
                        direction.z += (Math.random() - 0.5) * missAmount;
                        
                        ball.velocity.set(direction.x * 0.4, 0.5, direction.z * 0.2);
                        ball.isFlying = true;
                        ballHolder = null;
                    } else {
                        // Move towards hoop
                        const dir = hoopPos.clone().sub(ai.position).normalize();
                        ai.position.x += dir.x * speed;
                        ai.position.z += dir.z * speed;
                    }
                } else if (!hasBall && ballHolder !== ai) {
                    // Support ball carrier
                    const targetX = ballHolder ? ballHolder.position.x - 5 : 0;
                    const targetZ = (index - 2) * 4;
                    const dir = new THREE.Vector3(targetX - ai.position.x, 0, targetZ - ai.position.z);
                    if (dir.length() > 1) {
                        dir.normalize();
                        ai.position.x += dir.x * speed * 0.5;
                        ai.position.z += dir.z * speed * 0.5;
                    }
                } else {
                    // Defense - follow player with ball or controlled player
                    const target = ballHolder || controlledPlayer;
                    if (target && !target.isAI) {
                        const dir = target.position.clone().sub(ai.position);
                        if (dir.length() > 2) {
                            dir.normalize();
                            ai.position.x += dir.x * speed;
                            ai.position.z += dir.z * speed;
                        }
                        
                        // Steal attempt
                        if (dir.length() < 1.5 && ballHolder === target && Math.random() < 0.005 * ai.stats.defense / 100) {
                            hasBall = false;
                            ballHolder = ai;
                            shotClock = 24;
                        }
                    }
                }
                
                // Face the ball
                ai.lookAt(ball.position.x, 0, ball.position.z);
            });
            
            // Teammate AI
            players.forEach((p, index) => {
                if (p !== controlledPlayer) {
                    const speed = (p.stats.speed / 100) * 0.05;
                    
                    if (hasBall) {
                        // Offensive movement
                        const targetX = 10 + index * 3;
                        const targetZ = (index - 2) * 5;
                        const dir = new THREE.Vector3(targetX - p.position.x, 0, targetZ - p.position.z);
                        if (dir.length() > 1) {
                            dir.normalize();
                            p.position.x += dir.x * speed;
                            p.position.z += dir.z * speed;
                        }
                    } else {
                        // Defensive movement
                        const targetAI = aiPlayers[index] || aiPlayers[0];
                        const dir = targetAI.position.clone().sub(p.position);
                        if (dir.length() > 2) {
                            dir.normalize();
                            p.position.x += dir.x * speed;
                            p.position.z += dir.z * speed;
                        }
                    }
                    
                    p.lookAt(ball.position.x, 0, ball.position.z);
                }
            });
        }
        
        function updateCamera() {
            if (!controlledPlayer) return;
            
            // First person camera
            const eyeHeight = 2.8;
            camera.position.set(
                controlledPlayer.position.x,
                eyeHeight,
                controlledPlayer.position.z
            );
            
            // Look direction
            const lookX = controlledPlayer.position.x + Math.sin(mouseX) * 10;
            const lookY = eyeHeight - mouseY * 5;
            const lookZ = controlledPlayer.position.z + Math.cos(mouseX) * 10;
            
            camera.lookAt(lookX, lookY, lookZ);
        }
        
        function animateAudience() {
            audience.forEach((person, i) => {
                // Random cheering animation
                if (Math.random() < 0.01) {
                    person.position.y += Math.sin(Date.now() * 0.01 + i) * 0.02;
                }
            });
        }
        
        function endGame() {
            gameStarted = false;
            document.getElementById('gameOver').style.display = 'flex';
            document.getElementById('winnerText').textContent = yourScore >= 10 ? 'YOU WIN!' : 'AI WINS!';
            document.getElementById('finalScore').textContent = `${yourScore} - ${aiScore}`;
            document.exitPointerLock();
        }
        
        function animate() {
            if (!gameStarted) return;
            
            requestAnimationFrame(animate);
            
            updatePlayerMovement();
            updateAI();
            updateBall();
            updateCamera();
            animateAudience();
            
            renderer.render(scene, camera);
        }
        
        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
