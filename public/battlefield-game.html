<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World War Battlefield</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: 'Arial', sans-serif; background: #000; }
        #game-container { width: 100vw; height: 100vh; position: relative; }
        canvas { display: block; }
        
        /* Country Selection Screen */
        #country-select {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #country-select h1 {
            color: #fff;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        #country-select p {
            color: #aaa;
            font-size: 18px;
            margin-bottom: 40px;
        }
        .flag-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }
        .flag-btn {
            width: 140px;
            height: 100px;
            border: 3px solid #444;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            overflow: hidden;
        }
        .flag-btn:hover {
            transform: scale(1.1);
            border-color: #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }
        .flag-btn canvas {
            width: 100px;
            height: 60px;
            margin-bottom: 5px;
        }
        .flag-btn span {
            color: #fff;
            font-size: 12px;
            font-weight: bold;
        }
        
        /* HUD */
        #hud {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            display: none;
        }
        #health-bar {
            position: absolute;
            bottom: 30px; left: 30px;
            width: 250px; height: 25px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #fff;
            border-radius: 5px;
            overflow: hidden;
        }
        #health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444);
            transition: width 0.3s ease;
        }
        #health-text {
            position: absolute;
            bottom: 60px; left: 30px;
            color: #fff;
            font-size: 14px;
            text-shadow: 2px 2px 4px #000;
        }
        #score {
            position: absolute;
            top: 30px; right: 30px;
            color: #fff;
            font-size: 24px;
            text-shadow: 2px 2px 4px #000;
        }
        #ammo {
            position: absolute;
            bottom: 30px; right: 30px;
            color: #fff;
            font-size: 20px;
            text-shadow: 2px 2px 4px #000;
        }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 30px; height: 30px;
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50%;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.8);
        }
        #crosshair::before {
            width: 2px; height: 10px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        #crosshair::after {
            width: 10px; height: 2px;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
        #wave-info {
            position: absolute;
            top: 30px; left: 30px;
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px 4px #000;
        }
        
        /* Bullet Cam Prompt */
        #bullet-cam-prompt {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 24px;
            display: none;
            text-align: center;
            border: 2px solid #ff4444;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px #ff4444; }
            50% { box-shadow: 0 0 30px #ff4444; }
        }
        #bullet-cam-prompt small {
            display: block;
            font-size: 14px;
            color: #aaa;
            margin-top: 10px;
        }
        
        /* Game Over */
        #game-over {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        #game-over h1 {
            color: #ff0000;
            font-size: 64px;
            margin-bottom: 20px;
        }
        #game-over p {
            color: #fff;
            font-size: 24px;
            margin-bottom: 30px;
        }
        #restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #ff4444;
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            pointer-events: all;
        }
        #restart-btn:hover {
            background: #ff6666;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Country Selection -->
        <div id="country-select">
            <h1>WORLD WAR BATTLEFIELD</h1>
            <p>Choose Your Nation</p>
            <div class="flag-container" id="flags"></div>
        </div>
        
        <!-- HUD -->
        <div id="hud">
            <div id="crosshair"></div>
            <div id="health-text">HEALTH</div>
            <div id="health-bar"><div id="health-fill"></div></div>
            <div id="score">KILLS: 0</div>
            <div id="ammo">AMMO: 30 / 90</div>
            <div id="wave-info">WAVE 1</div>
            <div id="bullet-cam-prompt">BULLET CAM READY!<small>Press ENTER to follow bullet</small></div>
        </div>
        
        <!-- Game Over -->
        <div id="game-over">
            <h1>GAME OVER</h1>
            <p>Final Score: <span id="final-score">0</span></p>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Flag Drawing Functions
        const flagDrawers = {
            US: (ctx, w, h) => {
                // Red and white stripes
                const stripeH = h / 13;
                for (let i = 0; i < 13; i++) {
                    ctx.fillStyle = i % 2 === 0 ? '#B22234' : '#FFFFFF';
                    ctx.fillRect(0, i * stripeH, w, stripeH);
                }
                // Blue canton
                ctx.fillStyle = '#3C3B6E';
                ctx.fillRect(0, 0, w * 0.4, stripeH * 7);
                // Stars (simplified)
                ctx.fillStyle = '#FFFFFF';
                const starRows = [6, 5, 6, 5, 6, 5, 6, 5, 6];
                for (let row = 0; row < 9; row++) {
                    const stars = starRows[row];
                    const offsetX = stars === 5 ? 8 : 4;
                    for (let s = 0; s < stars; s++) {
                        const x = offsetX + s * 12;
                        const y = 4 + row * 6;
                        ctx.beginPath();
                        ctx.arc(x, y, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            },
            GB: (ctx, w, h) => {
                // Blue background
                ctx.fillStyle = '#012169';
                ctx.fillRect(0, 0, w, h);
                // White diagonals
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 10;
                ctx.beginPath();
                ctx.moveTo(0, 0); ctx.lineTo(w, h);
                ctx.moveTo(w, 0); ctx.lineTo(0, h);
                ctx.stroke();
                // Red diagonals
                ctx.strokeStyle = '#C8102E';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(0, 0); ctx.lineTo(w, h);
                ctx.moveTo(w, 0); ctx.lineTo(0, h);
                ctx.stroke();
                // White cross
                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 16;
                ctx.beginPath();
                ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
                ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
                ctx.stroke();
                // Red cross
                ctx.strokeStyle = '#C8102E';
                ctx.lineWidth = 10;
                ctx.beginPath();
                ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
                ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
                ctx.stroke();
            },
            FR: (ctx, w, h) => {
                ctx.fillStyle = '#002395';
                ctx.fillRect(0, 0, w/3, h);
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(w/3, 0, w/3, h);
                ctx.fillStyle = '#ED2939';
                ctx.fillRect(2*w/3, 0, w/3, h);
            },
            IL: (ctx, w, h) => {
                // White background
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, w, h);
                // Blue stripes
                ctx.fillStyle = '#0038B8';
                ctx.fillRect(0, h * 0.15, w, h * 0.1);
                ctx.fillRect(0, h * 0.75, w, h * 0.1);
                // Star of David
                ctx.strokeStyle = '#0038B8';
                ctx.lineWidth = 3;
                const cx = w/2, cy = h/2, size = h * 0.25;
                // Triangle up
                ctx.beginPath();
                ctx.moveTo(cx, cy - size);
                ctx.lineTo(cx - size * 0.866, cy + size * 0.5);
                ctx.lineTo(cx + size * 0.866, cy + size * 0.5);
                ctx.closePath();
                ctx.stroke();
                // Triangle down
                ctx.beginPath();
                ctx.moveTo(cx, cy + size);
                ctx.lineTo(cx - size * 0.866, cy - size * 0.5);
                ctx.lineTo(cx + size * 0.866, cy - size * 0.5);
                ctx.closePath();
                ctx.stroke();
            },
            JP: (ctx, w, h) => {
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, w, h);
                ctx.fillStyle = '#BC002D';
                ctx.beginPath();
                ctx.arc(w/2, h/2, h * 0.3, 0, Math.PI * 2);
                ctx.fill();
            }
        };

        const countries = [
            { code: 'US', name: 'USA' },
            { code: 'GB', name: 'UK' },
            { code: 'FR', name: 'France' },
            { code: 'IL', name: 'Israel' },
            { code: 'JP', name: 'Japan' }
        ];

        // Create flag buttons
        const flagsContainer = document.getElementById('flags');
        countries.forEach(country => {
            const btn = document.createElement('div');
            btn.className = 'flag-btn';
            btn.dataset.country = country.code;
            
            const canvas = document.createElement('canvas');
            canvas.width = 100;
            canvas.height = 60;
            const ctx = canvas.getContext('2d');
            flagDrawers[country.code](ctx, 100, 60);
            
            const span = document.createElement('span');
            span.textContent = country.name;
            
            btn.appendChild(canvas);
            btn.appendChild(span);
            btn.onclick = () => startGame(country.code);
            flagsContainer.appendChild(btn);
        });

        // Game Variables
        let scene, camera, renderer, player, clock;
        let enemies = [];
        let bullets = [];
        let health = 100;
        let score = 0;
        let ammo = 30;
        let maxAmmo = 30;
        let reserveAmmo = 90;
        let wave = 1;
        let gameActive = false;
        let selectedCountry = '';
        
        // Controls
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let isSprinting = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let yaw = 0, pitch = 0;
        
        // Bullet cam
        let bulletCamReady = false;
        let bulletCamActive = false;
        let bulletCamBullet = null;
        let bulletCamTarget = null;

        function startGame(country) {
            selectedCountry = country;
            document.getElementById('country-select').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            initGame();
        }

        function initGame() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 200);

            // Camera (First Person)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('game-container').appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 50);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // Ground
            const groundGeo = new THREE.PlaneGeometry(500, 500);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x3d5c3d });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Obstacles (crates, walls)
            createObstacles();

            // Clock
            clock = new THREE.Clock();

            // Controls
            setupControls();

            // Spawn first wave
            spawnWave();

            gameActive = true;
            animate();
        }

        function createObstacles() {
            const crateMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
            const wallMat = new THREE.MeshLambertMaterial({ color: 0x696969 });
            
            // Random crates
            for (let i = 0; i < 20; i++) {
                const size = 1 + Math.random() * 2;
                const crate = new THREE.Mesh(
                    new THREE.BoxGeometry(size, size, size),
                    crateMat
                );
                crate.position.set(
                    (Math.random() - 0.5) * 80,
                    size / 2,
                    (Math.random() - 0.5) * 80
                );
                crate.castShadow = true;
                scene.add(crate);
            }

            // Walls
            for (let i = 0; i < 8; i++) {
                const wall = new THREE.Mesh(
                    new THREE.BoxGeometry(10, 4, 1),
                    wallMat
                );
                wall.position.set(
                    (Math.random() - 0.5) * 60,
                    2,
                    (Math.random() - 0.5) * 60
                );
                wall.rotation.y = Math.random() * Math.PI;
                wall.castShadow = true;
                scene.add(wall);
            }
        }

        function createStickman(x, z) {
            const enemy = new THREE.Group();
            
            // Colors
            const skinColor = 0xFFDBB4;
            const uniformColor = 0x4a5d23; // Army green
            
            // Head
            const head = new THREE.Mesh(
                new THREE.SphereGeometry(0.25, 16, 16),
                new THREE.MeshLambertMaterial({ color: skinColor })
            );
            head.position.y = 1.75;
            enemy.add(head);
            
            // Helmet
            const helmet = new THREE.Mesh(
                new THREE.SphereGeometry(0.28, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2),
                new THREE.MeshLambertMaterial({ color: 0x3d3d3d })
            );
            helmet.position.y = 1.8;
            enemy.add(helmet);
            
            // Body
            const body = new THREE.Mesh(
                new THREE.CylinderGeometry(0.2, 0.25, 0.8, 8),
                new THREE.MeshLambertMaterial({ color: uniformColor })
            );
            body.position.y = 1.2;
            enemy.add(body);
            
            // Arms
            const armGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.5, 8);
            const armMat = new THREE.MeshLambertMaterial({ color: uniformColor });
            
            const leftArm = new THREE.Mesh(armGeo, armMat);
            leftArm.position.set(-0.35, 1.3, 0);
            leftArm.rotation.z = Math.PI / 4;
            enemy.add(leftArm);
            
            const rightArm = new THREE.Mesh(armGeo, armMat);
            rightArm.position.set(0.35, 1.3, 0);
            rightArm.rotation.z = -Math.PI / 4;
            enemy.add(rightArm);
            
            // Legs
            const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.6, 8);
            const legMat = new THREE.MeshLambertMaterial({ color: 0x3d3d3d });
            
            const leftLeg = new THREE.Mesh(legGeo, legMat);
            leftLeg.position.set(-0.12, 0.5, 0);
            enemy.add(leftLeg);
            
            const rightLeg = new THREE.Mesh(legGeo, legMat);
            rightLeg.position.set(0.12, 0.5, 0);
            enemy.add(rightLeg);
            
            // Weapon (simple rifle)
            const rifle = new THREE.Mesh(
                new THREE.BoxGeometry(0.08, 0.08, 0.8),
                new THREE.MeshLambertMaterial({ color: 0x2d2d2d })
            );
            rifle.position.set(0.3, 1.2, 0.3);
            enemy.add(rifle);
            
            enemy.position.set(x, 0, z);
            enemy.userData = { 
                health: 30, 
                speed: 2 + Math.random() * 2,
                lastAttack: 0
            };
            
            scene.add(enemy);
            enemies.push(enemy);
        }

        function spawnWave() {
            const count = 5 + wave * 3;
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = 30 + Math.random() * 30;
                createStickman(
                    Math.cos(angle) * dist,
                    Math.sin(angle) * dist
                );
            }
            document.getElementById('wave-info').textContent = 'WAVE ' + wave;
        }

        function setupControls() {
            // Pointer lock
            renderer.domElement.addEventListener('click', () => {
                if (!bulletCamActive) {
                    renderer.domElement.requestPointerLock();
                }
            });

            // Mouse movement
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === renderer.domElement && !bulletCamActive) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitch));
                }
            });

            // Keyboard
            document.addEventListener('keydown', (e) => {
                switch(e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'ShiftLeft': isSprinting = true; break;
                    case 'KeyR': reload(); break;
                    case 'Enter':
                        if (bulletCamReady && !bulletCamActive) {
                            activateBulletCam();
                        }
                        break;
                }
            });

            document.addEventListener('keyup', (e) => {
                switch(e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                    case 'ShiftLeft': isSprinting = false; break;
                }
            });

            // Shooting
            document.addEventListener('mousedown', (e) => {
                if (e.button === 0 && document.pointerLockElement === renderer.domElement && !bulletCamActive) {
                    shoot();
                }
            });
        }

        function shoot() {
            if (ammo <= 0) {
                reload();
                return;
            }
            
            ammo--;
            updateHUD();

            // Create bullet
            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.05, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xffff00 })
            );
            
            bullet.position.copy(camera.position);
            
            // Direction from camera
            const dir = new THREE.Vector3(0, 0, -1);
            dir.applyQuaternion(camera.quaternion);
            bullet.userData = { 
                velocity: dir.multiplyScalar(100),
                distance: 0,
                canBulletCam: true
            };
            
            scene.add(bullet);
            bullets.push(bullet);
            
            // Check if we can offer bullet cam (if aiming near enemy)
            const raycaster = new THREE.Raycaster(camera.position, dir.clone().normalize());
            let nearestEnemy = null;
            let nearestDist = Infinity;
            
            enemies.forEach(enemy => {
                const dist = camera.position.distanceTo(enemy.position);
                if (dist < nearestDist && dist < 50) {
                    nearestDist = dist;
                    nearestEnemy = enemy;
                }
            });
            
            if (nearestEnemy && Math.random() < 0.3) { // 30% chance for bullet cam
                bulletCamReady = true;
                bulletCamBullet = bullet;
                bulletCamTarget = nearestEnemy;
                document.getElementById('bullet-cam-prompt').style.display = 'block';
                
                // Auto-hide after 1 second
                setTimeout(() => {
                    if (!bulletCamActive) {
                        bulletCamReady = false;
                        document.getElementById('bullet-cam-prompt').style.display = 'none';
                    }
                }, 1000);
            }
        }

        function activateBulletCam() {
            if (!bulletCamBullet || !bulletCamTarget) return;
            
            bulletCamActive = true;
            bulletCamReady = false;
            document.getElementById('bullet-cam-prompt').style.display = 'none';
            document.exitPointerLock();
            
            // Slow motion effect
            bulletCamBullet.userData.velocity.multiplyScalar(0.1);
        }

        function updateBulletCam() {
            if (!bulletCamActive || !bulletCamBullet || !bulletCamTarget) return;
            
            // Position camera behind bullet
            const bulletDir = bulletCamBullet.userData.velocity.clone().normalize();
            const camOffset = bulletDir.clone().multiplyScalar(-2);
            camOffset.y += 0.5;
            
            camera.position.copy(bulletCamBullet.position).add(camOffset);
            camera.lookAt(bulletCamTarget.position.clone().add(new THREE.Vector3(0, 1.5, 0)));
            
            // Check if bullet hit target
            const dist = bulletCamBullet.position.distanceTo(bulletCamTarget.position);
            if (dist < 1) {
                // Hit! Create impact effect
                bulletCamTarget.userData.health -= 100;
                
                // End bullet cam after short delay
                setTimeout(() => {
                    bulletCamActive = false;
                    bulletCamBullet = null;
                    bulletCamTarget = null;
                }, 500);
            }
        }

        function reload() {
            if (reserveAmmo <= 0 || ammo === maxAmmo) return;
            const needed = maxAmmo - ammo;
            const take = Math.min(needed, reserveAmmo);
            ammo += take;
            reserveAmmo -= take;
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('health-fill').style.width = health + '%';
            document.getElementById('score').textContent = 'KILLS: ' + score;
            document.getElementById('ammo').textContent = 'AMMO: ' + ammo + ' / ' + reserveAmmo;
        }

        function animate() {
            if (!gameActive) return;
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (!bulletCamActive) {
                // Player movement
                const speed = isSprinting ? 15 : 8;
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                velocity.x = direction.x * speed;
                velocity.z = direction.z * speed;

                // Apply rotation
                const moveX = velocity.x * Math.cos(yaw) - velocity.z * Math.sin(yaw);
                const moveZ = velocity.x * Math.sin(yaw) + velocity.z * Math.cos(yaw);

                camera.position.x += moveX * delta;
                camera.position.z += moveZ * delta;

                // Update camera rotation
                camera.rotation.order = 'YXZ';
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;
            } else {
                updateBulletCam();
            }

            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.position.add(bullet.userData.velocity.clone().multiplyScalar(delta));
                bullet.userData.distance += bullet.userData.velocity.length() * delta;

                // Check enemy hits
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    if (bullet.position.distanceTo(enemy.position.clone().add(new THREE.Vector3(0, 1.2, 0))) < 0.8) {
                        enemy.userData.health -= 35;
                        
                        if (enemy.userData.health <= 0) {
                            scene.remove(enemy);
                            enemies.splice(j, 1);
                            score++;
                            updateHUD();
                        }
                        
                        scene.remove(bullet);
                        bullets.splice(i, 1);
                        break;
                    }
                }

                // Remove if too far
                if (bullet.userData.distance > 200) {
                    scene.remove(bullet);
                    bullets.splice(i, 1);
                }
            }

            // Update enemies
            const now = Date.now();
            enemies.forEach(enemy => {
                // Move toward player
                const toPlayer = new THREE.Vector3();
                toPlayer.subVectors(camera.position, enemy.position);
                toPlayer.y = 0;
                const dist = toPlayer.length();
                toPlayer.normalize();

                if (dist > 2) {
                    enemy.position.add(toPlayer.multiplyScalar(enemy.userData.speed * delta));
                    enemy.lookAt(camera.position.x, enemy.position.y, camera.position.z);
                } else if (now - enemy.userData.lastAttack > 1000) {
                    // Attack player
                    health -= 10;
                    enemy.userData.lastAttack = now;
                    updateHUD();
                    
                    if (health <= 0) {
                        gameOver();
                    }
                }
                
                // Simple walk animation
                enemy.children[4].position.z = Math.sin(now * 0.01) * 0.1;
                enemy.children[5].position.z = -Math.sin(now * 0.01) * 0.1;
            });

            // Check wave complete
            if (enemies.length === 0) {
                wave++;
                spawnWave();
            }

            renderer.render(scene, camera);
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('game-over').style.display = 'flex';
            document.getElementById('final-score').textContent = score;
            document.exitPointerLock();
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            location.reload();
        });

        // Handle resize
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
