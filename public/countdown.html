<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }
        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #e94560;
        }
        .timer-display {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }
        .time-box {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            min-width: 80px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .time-value {
            font-size: clamp(2rem, 10vw, 4rem);
            font-weight: bold;
            color: #e94560;
        }
        .time-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-top: 5px;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        input {
            width: 70px;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.2rem;
            text-align: center;
        }
        input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        button {
            padding: 15px 35px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            min-width: 120px;
        }
        .start-btn {
            background: #e94560;
            color: white;
        }
        .start-btn:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }
        .pause-btn {
            background: #f39c12;
            color: white;
        }
        .pause-btn:hover {
            background: #f1c40f;
        }
        .reset-btn {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .reset-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .finished {
            animation: pulse 0.5s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Countdown Timer</h1>
        
        <div class="timer-display">
            <div class="time-box">
                <div class="time-value" id="hours">00</div>
                <div class="time-label">Hours</div>
            </div>
            <div class="time-box">
                <div class="time-value" id="minutes">00</div>
                <div class="time-label">Minutes</div>
            </div>
            <div class="time-box">
                <div class="time-value" id="seconds">00</div>
                <div class="time-label">Seconds</div>
            </div>
        </div>
        
        <div class="input-group">
            <input type="number" id="inputHours" placeholder="HH" min="0" max="99">
            <input type="number" id="inputMinutes" placeholder="MM" min="0" max="59">
            <input type="number" id="inputSeconds" placeholder="SS" min="0" max="59">
        </div>
        
        <div class="controls">
            <button class="start-btn" id="startBtn">Start</button>
            <button class="pause-btn" id="pauseBtn">Pause</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>
    </div>

    <script>
        let totalSeconds = 0;
        let interval = null;
        let isPaused = false;

        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const inputHours = document.getElementById('inputHours');
        const inputMinutes = document.getElementById('inputMinutes');
        const inputSeconds = document.getElementById('inputSeconds');

        function updateDisplay() {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60);
            const s = totalSeconds % 60;
            
            hoursEl.textContent = h.toString().padStart(2, '0');
            minutesEl.textContent = m.toString().padStart(2, '0');
            secondsEl.textContent = s.toString().padStart(2, '0');
        }

        function startTimer() {
            if (interval) return;
            
            if (totalSeconds === 0) {
                const h = parseInt(inputHours.value) || 0;
                const m = parseInt(inputMinutes.value) || 0;
                const s = parseInt(inputSeconds.value) || 0;
                totalSeconds = h * 3600 + m * 60 + s;
            }
            
            if (totalSeconds <= 0) return;
            
            interval = setInterval(() => {
                if (!isPaused) {
                    totalSeconds--;
                    updateDisplay();
                    
                    if (totalSeconds <= 0) {
                        clearInterval(interval);
                        interval = null;
                        document.querySelector('.container').classList.add('finished');
                        setTimeout(() => {
                            alert('Time is up!');
                            document.querySelector('.container').classList.remove('finished');
                        }, 100);
                    }
                }
            }, 1000);
        }

        function pauseTimer() {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';
        }

        function resetTimer() {
            clearInterval(interval);
            interval = null;
            isPaused = false;
            totalSeconds = 0;
            pauseBtn.textContent = 'Pause';
            updateDisplay();
            document.querySelector('.container').classList.remove('finished');
        }

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);

        updateDisplay();
    </script>
</body>
</html>
