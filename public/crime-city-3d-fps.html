<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime City 3D - First Person</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        #gameCanvas { display: block; }
        #blocker {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }
        #blocker h1 { color: #ff3333; font-size: 48px; margin-bottom: 20px; text-shadow: 0 0 20px #ff0000; }
        #blocker p { color: #fff; font-size: 18px; margin: 5px 0; }
        #blocker .start-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 24px;
            background: #ff3333;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #blocker .start-btn:hover { background: #ff5555; }
        #hud {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 16px;
            z-index: 50;
            text-shadow: 2px 2px 4px black;
        }
        .hud-item { margin: 5px 0; }
        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            z-index: 50;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }
        #crosshair::before { width: 2px; height: 20px; left: 9px; }
        #crosshair::after { width: 20px; height: 2px; top: 9px; }
        #wanted {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 50;
        }
        .star { font-size: 30px; color: #333; text-shadow: 0 0 5px black; }
        .star.active { color: #ffcc00; text-shadow: 0 0 10px #ff9900; }
        #message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px black;
            z-index: 50;
            display: none;
        }
        #vehicle-prompt {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffcc00;
            font-size: 18px;
            text-shadow: 2px 2px 4px black;
            z-index: 50;
            display: none;
        }
    </style>
</head>
<body>
    <div id="blocker">
        <h1>CRIME CITY 3D</h1>
        <p>WASD - Move | Mouse - Look | SHIFT - Sprint</p>
        <p>LEFT CLICK - Shoot | F - Punch | G - Kick</p>
        <p>SPACE - Enter/Exit Vehicle | R - Reload</p>
        <button class="start-btn" onclick="startGame()">CLICK TO PLAY</button>
    </div>
    <div id="crosshair"></div>
    <div id="hud">
        <div class="hud-item">Health: <span id="health">100</span></div>
        <div class="hud-item">Ammo: <span id="ammo">30</span> / <span id="maxAmmo">90</span></div>
        <div class="hud-item">Score: <span id="score">0</span></div>
    </div>
    <div id="wanted">
        <span class="star">&#9733;</span>
        <span class="star">&#9733;</span>
        <span class="star">&#9733;</span>
        <span class="star">&#9733;</span>
        <span class="star">&#9733;</span>
    </div>
    <div id="message"></div>
    <div id="vehicle-prompt">Press SPACE to enter vehicle</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, player;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false, isSprinting = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let prevTime = performance.now();
        
        let health = 100, ammo = 30, maxAmmo = 90, score = 0, wantedLevel = 0;
        let pedestrians = [], cops = [], bullets = [], cars = [];
        let inVehicle = false, currentVehicle = null;
        let nearVehicle = null;
        
        const raycaster = new THREE.Raycaster();
        let isLocked = false;

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 300);

            // Camera (First Person)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.7, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(100, 100, 50);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 10;
            sunLight.shadow.camera.far = 400;
            sunLight.shadow.camera.left = -100;
            sunLight.shadow.camera.right = 100;
            sunLight.shadow.camera.top = 100;
            sunLight.shadow.camera.bottom = -100;
            scene.add(sunLight);

            // Ground
            const groundGeo = new THREE.PlaneGeometry(500, 500);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Create city
            createCity();

            // Create pedestrians
            for (let i = 0; i < 20; i++) {
                createPedestrian();
            }

            // Create parked cars
            for (let i = 0; i < 10; i++) {
                createCar();
            }

            // Player hands/gun
            createPlayerGun();

            // Event listeners
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove);

            window.addEventListener('resize', onWindowResize);

            animate();
        }

        function createCity() {
            // Roads
            const roadMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
            
            // Main roads
            for (let i = -2; i <= 2; i++) {
                const roadH = new THREE.Mesh(new THREE.PlaneGeometry(500, 15), roadMat);
                roadH.rotation.x = -Math.PI / 2;
                roadH.position.set(0, 0.01, i * 60);
                scene.add(roadH);

                const roadV = new THREE.Mesh(new THREE.PlaneGeometry(15, 500), roadMat);
                roadV.rotation.x = -Math.PI / 2;
                roadV.position.set(i * 60, 0.01, 0);
                scene.add(roadV);
            }

            // Road lines
            const lineMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            for (let i = -2; i <= 2; i++) {
                for (let j = -20; j < 20; j++) {
                    const line = new THREE.Mesh(new THREE.PlaneGeometry(4, 0.5), lineMat);
                    line.rotation.x = -Math.PI / 2;
                    line.position.set(j * 12, 0.02, i * 60);
                    scene.add(line);
                }
            }

            // Buildings
            const buildingColors = [0x8B4513, 0x696969, 0x2F4F4F, 0x483D8B, 0x556B2F, 0x8B0000];
            
            for (let x = -3; x <= 3; x++) {
                for (let z = -3; z <= 3; z++) {
                    if (Math.abs(x * 60) < 10 || Math.abs(z * 60) < 10) continue;
                    
                    const width = 20 + Math.random() * 20;
                    const height = 15 + Math.random() * 40;
                    const depth = 20 + Math.random() * 20;
                    
                    const buildingGeo = new THREE.BoxGeometry(width, height, depth);
                    const buildingMat = new THREE.MeshLambertMaterial({ 
                        color: buildingColors[Math.floor(Math.random() * buildingColors.length)] 
                    });
                    const building = new THREE.Mesh(buildingGeo, buildingMat);
                    building.position.set(
                        x * 60 + (Math.random() - 0.5) * 20,
                        height / 2,
                        z * 60 + (Math.random() - 0.5) * 20
                    );
                    building.castShadow = true;
                    building.receiveShadow = true;
                    scene.add(building);

                    // Windows
                    const windowMat = new THREE.MeshBasicMaterial({ color: 0xffffcc });
                    for (let wy = 3; wy < height - 2; wy += 4) {
                        for (let wx = -width/2 + 3; wx < width/2 - 2; wx += 5) {
                            const windowMesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2.5), windowMat);
                            windowMesh.position.set(
                                building.position.x + wx,
                                wy,
                                building.position.z + depth/2 + 0.1
                            );
                            scene.add(windowMesh);
                        }
                    }
                }
            }

            // Sidewalks
            const sidewalkMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
            for (let i = -2; i <= 2; i++) {
                const sw1 = new THREE.Mesh(new THREE.BoxGeometry(500, 0.15, 3), sidewalkMat);
                sw1.position.set(0, 0.075, i * 60 + 9);
                scene.add(sw1);
                
                const sw2 = new THREE.Mesh(new THREE.BoxGeometry(500, 0.15, 3), sidewalkMat);
                sw2.position.set(0, 0.075, i * 60 - 9);
                scene.add(sw2);
            }

            // Street lamps
            for (let i = -8; i <= 8; i++) {
                createStreetLamp(i * 30, 9);
                createStreetLamp(i * 30, -9);
            }
        }

        function createStreetLamp(x, z) {
            const poleMat = new THREE.MeshLambertMaterial({ color: 0x333333 });
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 6), poleMat);
            pole.position.set(x, 3, z);
            scene.add(pole);

            const lampMat = new THREE.MeshBasicMaterial({ color: 0xffffaa });
            const lamp = new THREE.Mesh(new THREE.SphereGeometry(0.4), lampMat);
            lamp.position.set(x, 6.2, z);
            scene.add(lamp);

            const light = new THREE.PointLight(0xffffaa, 0.5, 20);
            light.position.set(x, 6, z);
            scene.add(light);
        }

        function createHumanBody(color, isPlayer = false) {
            const group = new THREE.Group();
            
            const skinColor = 0xffdbac;
            const skinMat = new THREE.MeshLambertMaterial({ color: skinColor });
            const clothMat = new THREE.MeshLambertMaterial({ color: color });
            const pantsMat = new THREE.MeshLambertMaterial({ color: 0x1a1a2e });
            const shoeMat = new THREE.MeshLambertMaterial({ color: 0x111111 });

            // Head
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), skinMat);
            head.position.y = 1.62;
            head.castShadow = true;
            group.add(head);

            // Hair
            const hairMat = new THREE.MeshLambertMaterial({ color: 0x2a1a0a });
            const hair = new THREE.Mesh(new THREE.SphereGeometry(0.23, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2), hairMat);
            hair.position.y = 1.67;
            group.add(hair);

            // Eyes
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.03), eyeMat);
            leftEye.position.set(-0.08, 1.65, 0.18);
            group.add(leftEye);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.03), eyeMat);
            rightEye.position.set(0.08, 1.65, 0.18);
            group.add(rightEye);

            // Neck
            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.12), skinMat);
            neck.position.y = 1.36;
            group.add(neck);

            // Torso
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.55, 0.25), clothMat);
            torso.position.y = 1.02;
            torso.castShadow = true;
            group.add(torso);

            // Arms
            const armGeo = new THREE.CylinderGeometry(0.06, 0.05, 0.55);
            const leftArm = new THREE.Mesh(armGeo, clothMat);
            leftArm.position.set(-0.32, 1.02, 0);
            leftArm.rotation.z = 0.1;
            leftArm.castShadow = true;
            group.add(leftArm);

            const rightArm = new THREE.Mesh(armGeo, clothMat);
            rightArm.position.set(0.32, 1.02, 0);
            rightArm.rotation.z = -0.1;
            rightArm.castShadow = true;
            group.add(rightArm);

            // Hands
            const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.06), skinMat);
            leftHand.position.set(-0.35, 0.72, 0);
            group.add(leftHand);
            const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.06), skinMat);
            rightHand.position.set(0.35, 0.72, 0);
            group.add(rightHand);

            // Pelvis/Hips
            const hips = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.22), pantsMat);
            hips.position.y = 0.68;
            group.add(hips);

            // Legs
            const legGeo = new THREE.CylinderGeometry(0.08, 0.06, 0.5);
            const leftLeg = new THREE.Mesh(legGeo, pantsMat);
            leftLeg.position.set(-0.12, 0.38, 0);
            leftLeg.castShadow = true;
            group.add(leftLeg);

            const rightLeg = new THREE.Mesh(legGeo, pantsMat);
            rightLeg.position.set(0.12, 0.38, 0);
            rightLeg.castShadow = true;
            group.add(rightLeg);

            // Lower legs
            const lowerLegGeo = new THREE.CylinderGeometry(0.06, 0.05, 0.45);
            const leftLowerLeg = new THREE.Mesh(lowerLegGeo, pantsMat);
            leftLowerLeg.position.set(-0.12, 0.05, 0);
            group.add(leftLowerLeg);
            const rightLowerLeg = new THREE.Mesh(lowerLegGeo, pantsMat);
            rightLowerLeg.position.set(0.12, 0.05, 0);
            group.add(rightLowerLeg);

            // Shoes
            const shoeGeo = new THREE.BoxGeometry(0.1, 0.08, 0.18);
            const leftShoe = new THREE.Mesh(shoeGeo, shoeMat);
            leftShoe.position.set(-0.12, -0.14, 0.03);
            group.add(leftShoe);
            const rightShoe = new THREE.Mesh(shoeGeo, shoeMat);
            rightShoe.position.set(0.12, -0.14, 0.03);
            group.add(rightShoe);

            return group;
        }

        function createPedestrian() {
            const colors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff, 0xff8800, 0x8800ff];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            const ped = createHumanBody(color);
            ped.position.set(
                (Math.random() - 0.5) * 200,
                0.18,
                (Math.random() - 0.5) * 200
            );
            
            ped.userData = {
                type: 'pedestrian',
                health: 100,
                direction: new THREE.Vector3(Math.random() - 0.5, 0, Math.random() - 0.5).normalize(),
                speed: 0.5 + Math.random() * 0.5,
                walkTimer: 0,
                changeTime: 3 + Math.random() * 4
            };
            
            scene.add(ped);
            pedestrians.push(ped);
        }

        function createCop() {
            const cop = createHumanBody(0x000066);
            cop.position.set(
                camera.position.x + (Math.random() - 0.5) * 50,
                0.18,
                camera.position.z + (Math.random() - 0.5) * 50
            );
            
            cop.userData = {
                type: 'cop',
                health: 150,
                speed: 2 + wantedLevel * 0.3,
                shootTimer: 0,
                shootCooldown: 1.5 - wantedLevel * 0.1
            };
            
            scene.add(cop);
            cops.push(cop);
        }

        function createCar() {
            const carColors = [0xff0000, 0x0000ff, 0x00ff00, 0xffff00, 0xffffff, 0x000000, 0xff8800];
            const color = carColors[Math.floor(Math.random() * carColors.length)];
            
            const car = new THREE.Group();
            
            // Body
            const bodyMat = new THREE.MeshLambertMaterial({ color: color });
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 4.5), bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            car.add(body);

            // Roof/Cabin
            const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.7, 2.2), bodyMat);
            cabin.position.set(0, 1.15, -0.3);
            cabin.castShadow = true;
            car.add(cabin);

            // Windows
            const glassMat = new THREE.MeshLambertMaterial({ color: 0x88ccff, transparent: true, opacity: 0.6 });
            const frontWindow = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.6), glassMat);
            frontWindow.position.set(0, 1.1, 0.8);
            frontWindow.rotation.x = -0.3;
            car.add(frontWindow);

            const rearWindow = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.5), glassMat);
            rearWindow.position.set(0, 1.1, -1.4);
            rearWindow.rotation.x = 0.3;
            car.add(rearWindow);

            // Wheels
            const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.25, 16);
            const wheelMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const wheelPositions = [
                [-1.0, 0.35, 1.3], [1.0, 0.35, 1.3],
                [-1.0, 0.35, -1.3], [1.0, 0.35, -1.3]
            ];
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.position.set(...pos);
                wheel.rotation.z = Math.PI / 2;
                wheel.castShadow = true;
                car.add(wheel);
            });

            // Headlights
            const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffcc });
            const hl1 = new THREE.Mesh(new THREE.CircleGeometry(0.15), lightMat);
            hl1.position.set(-0.7, 0.6, 2.26);
            car.add(hl1);
            const hl2 = new THREE.Mesh(new THREE.CircleGeometry(0.15), lightMat);
            hl2.position.set(0.7, 0.6, 2.26);
            car.add(hl2);

            // Taillights
            const tailMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const tl1 = new THREE.Mesh(new THREE.CircleGeometry(0.12), tailMat);
            tl1.position.set(-0.7, 0.6, -2.26);
            tl1.rotation.y = Math.PI;
            car.add(tl1);
            const tl2 = new THREE.Mesh(new THREE.CircleGeometry(0.12), tailMat);
            tl2.position.set(0.7, 0.6, -2.26);
            tl2.rotation.y = Math.PI;
            car.add(tl2);

            car.position.set(
                (Math.random() - 0.5) * 150,
                0,
                (Math.random() - 0.5) * 150
            );
            car.rotation.y = Math.random() * Math.PI * 2;

            car.userData = {
                type: 'car',
                speed: 0,
                maxSpeed: 30,
                acceleration: 15,
                velocity: new THREE.Vector3()
            };

            scene.add(car);
            cars.push(car);
        }

        function createPlayerGun() {
            const gunGroup = new THREE.Group();
            
            // Gun body
            const gunMat = new THREE.MeshLambertMaterial({ color: 0x222222 });
            const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.35), gunMat);
            barrel.position.z = -0.2;
            gunGroup.add(barrel);

            const grip = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.12, 0.08), gunMat);
            grip.position.set(0, -0.06, 0);
            gunGroup.add(grip);

            const slide = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.07, 0.25), gunMat);
            slide.position.set(0, 0.02, -0.1);
            gunGroup.add(slide);

            gunGroup.position.set(0.3, -0.25, -0.5);
            camera.add(gunGroup);
            player = { gun: gunGroup };
        }

        function shoot() {
            if (ammo <= 0) return;
            ammo--;
            updateHUD();

            // Muzzle flash
            const flash = new THREE.PointLight(0xffaa00, 2, 5);
            flash.position.copy(camera.position);
            scene.add(flash);
            setTimeout(() => scene.remove(flash), 50);

            // Gun recoil
            player.gun.position.z += 0.1;
            setTimeout(() => player.gun.position.z = -0.5, 100);

            // Raycast to hit
            raycaster.setFromCamera({ x: 0, y: 0 }, camera);
            
            const allTargets = [...pedestrians, ...cops];
            const intersects = raycaster.intersectObjects(allTargets, true);

            if (intersects.length > 0) {
                let hitObject = intersects[0].object;
                while (hitObject.parent && !hitObject.userData.type) {
                    hitObject = hitObject.parent;
                }

                if (hitObject.userData.type === 'pedestrian') {
                    hitObject.userData.health -= 50;
                    if (hitObject.userData.health <= 0) {
                        scene.remove(hitObject);
                        pedestrians = pedestrians.filter(p => p !== hitObject);
                        score += 100;
                        increaseWanted();
                        createPedestrian();
                    }
                    showHitMarker(intersects[0].point);
                } else if (hitObject.userData.type === 'cop') {
                    hitObject.userData.health -= 35;
                    if (hitObject.userData.health <= 0) {
                        scene.remove(hitObject);
                        cops = cops.filter(c => c !== hitObject);
                        score += 250;
                        increaseWanted();
                    }
                    showHitMarker(intersects[0].point);
                }
            }

            // Create bullet trail
            const bulletGeo = new THREE.CylinderGeometry(0.01, 0.01, 2);
            const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            bullet.position.copy(camera.position);
            bullet.quaternion.copy(camera.quaternion);
            bullet.rotateX(Math.PI / 2);
            scene.add(bullet);
            setTimeout(() => scene.remove(bullet), 50);

            updateHUD();
        }

        function showHitMarker(point) {
            // Visual feedback
        }

        function punch() {
            showMessage('PUNCH!');
            checkMeleeHit(30, 2);
        }

        function kick() {
            showMessage('KICK!');
            checkMeleeHit(40, 2.5);
        }

        function checkMeleeHit(damage, range) {
            raycaster.setFromCamera({ x: 0, y: 0 }, camera);
            
            const allTargets = [...pedestrians, ...cops];
            const intersects = raycaster.intersectObjects(allTargets, true);

            if (intersects.length > 0 && intersects[0].distance < range) {
                let hitObject = intersects[0].object;
                while (hitObject.parent && !hitObject.userData.type) {
                    hitObject = hitObject.parent;
                }

                if (hitObject.userData.type === 'pedestrian') {
                    hitObject.userData.health -= damage;
                    if (hitObject.userData.health <= 0) {
                        scene.remove(hitObject);
                        pedestrians = pedestrians.filter(p => p !== hitObject);
                        score += 50;
                        increaseWanted();
                        createPedestrian();
                    }
                } else if (hitObject.userData.type === 'cop') {
                    hitObject.userData.health -= damage;
                    if (hitObject.userData.health <= 0) {
                        scene.remove(hitObject);
                        cops = cops.filter(c => c !== hitObject);
                        score += 200;
                        increaseWanted();
                    }
                }
            }
        }

        function increaseWanted() {
            if (wantedLevel < 5) {
                wantedLevel++;
                updateWantedStars();
                
                // Spawn cops based on wanted level
                for (let i = 0; i < wantedLevel; i++) {
                    if (cops.length < wantedLevel * 2) {
                        createCop();
                    }
                }
            }
        }

        function updateWantedStars() {
            const stars = document.querySelectorAll('.star');
            stars.forEach((star, index) => {
                star.classList.toggle('active', index < wantedLevel);
            });
        }

        function enterVehicle(car) {
            inVehicle = true;
            currentVehicle = car;
            showMessage('Press SPACE to exit');
            document.getElementById('vehicle-prompt').style.display = 'none';
        }

        function exitVehicle() {
            inVehicle = false;
            camera.position.set(
                currentVehicle.position.x + 3,
                1.7,
                currentVehicle.position.z
            );
            currentVehicle.userData.speed = 0;
            currentVehicle = null;
        }

        function updateHUD() {
            document.getElementById('health').textContent = Math.max(0, Math.floor(health));
            document.getElementById('ammo').textContent = ammo;
            document.getElementById('maxAmmo').textContent = maxAmmo;
            document.getElementById('score').textContent = score;
        }

        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 1000);
        }

        function onKeyDown(event) {
            if (!isLocked) return;
            
            switch (event.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
                case 'ShiftLeft': isSprinting = true; break;
                case 'Space':
                    if (inVehicle) {
                        exitVehicle();
                    } else if (nearVehicle) {
                        enterVehicle(nearVehicle);
                    }
                    break;
                case 'KeyR':
                    if (maxAmmo > 0) {
                        const needed = 30 - ammo;
                        const reload = Math.min(needed, maxAmmo);
                        ammo += reload;
                        maxAmmo -= reload;
                        updateHUD();
                        showMessage('Reloading...');
                    }
                    break;
                case 'KeyF': punch(); break;
                case 'KeyG': kick(); break;
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
                case 'ShiftLeft': isSprinting = false; break;
            }
        }

        let euler = new THREE.Euler(0, 0, 0, 'YXZ');
        
        function onMouseMove(event) {
            if (!isLocked) return;

            const movementX = event.movementX || 0;
            const movementY = event.movementY || 0;

            euler.setFromQuaternion(camera.quaternion);
            euler.y -= movementX * 0.002;
            euler.x -= movementY * 0.002;
            euler.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, euler.x));
            camera.quaternion.setFromEuler(euler);
        }

        function onMouseDown(event) {
            if (!isLocked) return;
            if (event.button === 0) {
                shoot();
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;
            prevTime = time;

            if (isLocked) {
                if (inVehicle && currentVehicle) {
                    // Vehicle controls
                    const carSpeed = currentVehicle.userData.speed;
                    
                    if (moveForward) {
                        currentVehicle.userData.speed = Math.min(carSpeed + delta * 15, 30);
                    } else if (moveBackward) {
                        currentVehicle.userData.speed = Math.max(carSpeed - delta * 20, -10);
                    } else {
                        currentVehicle.userData.speed *= 0.98;
                    }

                    if (moveLeft) currentVehicle.rotation.y += delta * 2;
                    if (moveRight) currentVehicle.rotation.y -= delta * 2;

                    // Move car
                    const carDir = new THREE.Vector3(0, 0, 1);
                    carDir.applyQuaternion(currentVehicle.quaternion);
                    currentVehicle.position.add(carDir.multiplyScalar(currentVehicle.userData.speed * delta));

                    // Camera follows car
                    camera.position.set(
                        currentVehicle.position.x,
                        currentVehicle.position.y + 1.5,
                        currentVehicle.position.z
                    );

                    // Check for pedestrian hits
                    pedestrians.forEach((ped, index) => {
                        const dist = currentVehicle.position.distanceTo(ped.position);
                        if (dist < 2 && Math.abs(currentVehicle.userData.speed) > 5) {
                            scene.remove(ped);
                            pedestrians.splice(index, 1);
                            score += 150;
                            increaseWanted();
                            createPedestrian();
                        }
                    });

                } else {
                    // Walking controls
                    velocity.x -= velocity.x * 10.0 * delta;
                    velocity.z -= velocity.z * 10.0 * delta;

                    direction.z = Number(moveForward) - Number(moveBackward);
                    direction.x = Number(moveRight) - Number(moveLeft);
                    direction.normalize();

                    const speed = isSprinting ? 15 : 7;
                    if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta * 50;
                    if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta * 50;

                    const forward = new THREE.Vector3();
                    camera.getWorldDirection(forward);
                    forward.y = 0;
                    forward.normalize();

                    const right = new THREE.Vector3();
                    right.crossVectors(forward, new THREE.Vector3(0, 1, 0));

                    camera.position.add(forward.multiplyScalar(-velocity.z * delta));
                    camera.position.add(right.multiplyScalar(-velocity.x * delta));
                    camera.position.y = 1.7;
                }

                // Check for nearby vehicles
                nearVehicle = null;
                document.getElementById('vehicle-prompt').style.display = 'none';
                if (!inVehicle) {
                    cars.forEach(car => {
                        const dist = camera.position.distanceTo(car.position);
                        if (dist < 4) {
                            nearVehicle = car;
                            document.getElementById('vehicle-prompt').style.display = 'block';
                        }
                    });
                }

                // Update pedestrians
                pedestrians.forEach(ped => {
                    ped.userData.walkTimer += delta;
                    if (ped.userData.walkTimer > ped.userData.changeTime) {
                        ped.userData.walkTimer = 0;
                        ped.userData.direction = new THREE.Vector3(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
                        ped.userData.changeTime = 3 + Math.random() * 4;
                    }

                    ped.position.add(ped.userData.direction.clone().multiplyScalar(ped.userData.speed * delta));
                    ped.lookAt(ped.position.clone().add(ped.userData.direction));

                    // Keep in bounds
                    if (Math.abs(ped.position.x) > 120) ped.userData.direction.x *= -1;
                    if (Math.abs(ped.position.z) > 120) ped.userData.direction.z *= -1;

                    // Walking animation
                    const walkPhase = Math.sin(time * 0.01 * ped.userData.speed) * 0.1;
                    ped.position.y = 0.18 + Math.abs(walkPhase) * 0.05;
                });

                // Update cops - chase player
                cops.forEach((cop, index) => {
                    const dirToplayer = new THREE.Vector3();
                    dirToplayer.subVectors(camera.position, cop.position);
                    dirToplayer.y = 0;
                    const dist = dirToplayer.length();
                    dirToplayer.normalize();

                    if (dist > 3) {
                        cop.position.add(dirToplayer.multiplyScalar(cop.userData.speed * delta));
                        cop.lookAt(camera.position.x, cop.position.y, camera.position.z);
                    }

                    // Cops shoot
                    cop.userData.shootTimer += delta;
                    if (cop.userData.shootTimer > cop.userData.shootCooldown && dist < 30) {
                        cop.userData.shootTimer = 0;
                        
                        // Chance to hit based on distance
                        if (Math.random() < 0.3) {
                            health -= 10 + wantedLevel * 2;
                            updateHUD();
                            
                            if (health <= 0) {
                                gameOver();
                            }
                        }
                    }
                });

                // Wanted level decay
                if (wantedLevel > 0) {
                    // After some time without crime, wanted level decreases
                }
            }

            updateHUD();
            renderer.render(scene, camera);
        }

        function gameOver() {
            isLocked = false;
            document.exitPointerLock();
            document.getElementById('blocker').innerHTML = '<h1 style="color:#ff3333">WASTED</h1><p style="color:white;font-size:24px">Score: ' + score + '</p><button class="start-btn" onclick="location.reload()">Try Again</button>';
            document.getElementById('blocker').style.display = 'flex';
        }

        function startGame() {
            document.getElementById('blocker').style.display = 'none';
            document.body.requestPointerLock();
            isLocked = true;
            init();
        }

        document.addEventListener('pointerlockchange', () => {
            isLocked = document.pointerLockElement === document.body;
            if (!isLocked && health > 0) {
                document.getElementById('blocker').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
