<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Movie Studio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>AI Movie Studio</h1>
  <p>Describe any movie idea. Get a full production package instantly.</p>
</header>

<div class="container">

  <div class="prompt-box">
    <textarea id="prompt" placeholder="Describe your movie idea... e.g. A retired astronaut and a talking golden retriever become unlikely space cops investigating crimes across the galaxy..."></textarea>

    <div class="options-row">
      <select id="genre">
        <option value="">Any Genre</option>
        <option value="Action">Action</option>
        <option value="Comedy">Comedy</option>
        <option value="Horror">Horror</option>
        <option value="Sci-Fi">Sci-Fi</option>
        <option value="Romance">Romance</option>
        <option value="Thriller">Thriller</option>
        <option value="Drama">Drama</option>
        <option value="Fantasy">Fantasy</option>
        <option value="Animation">Animation</option>
        <option value="Horror Comedy">Horror Comedy</option>
      </select>
      <select id="era">
        <option value="modern">Modern Day</option>
        <option value="80s">80s Style</option>
        <option value="90s">90s Style</option>
        <option value="futuristic">Futuristic</option>
        <option value="period">Period Piece</option>
        <option value="post-apocalyptic">Post-Apocalyptic</option>
      </select>
      <select id="rating">
        <option value="PG-13">PG-13</option>
        <option value="PG">PG</option>
        <option value="R">R</option>
        <option value="G">G</option>
      </select>
    </div>

    <div class="tone-row">
      <label>Tone: <span id="tone-val">Balanced</span></label>
      <input type="range" id="tone" min="1" max="10" value="5">
      <div class="tone-labels"><span>Dead Serious</span><span>Pure Campy</span></div>
    </div>

    <button class="generate-btn" id="generate-btn">GENERATE MY MOVIE</button>
    <p style="text-align:center;color:#666;font-size:0.8rem;margin-top:10px;">Tip: Press Ctrl+Enter to generate</p>
  </div>

  <div id="error-box" class="error-box"></div>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p id="loading-msg">Pitching to studio executives...</p>
  </div>

  <div id="result" class="result">

    <div class="poster-section">
      <div class="poster-img" id="poster-area">
        <div class="poster-placeholder">AI Poster Coming Soon</div>
      </div>
      <div class="movie-meta">
        <div class="movie-title" id="movie-title"></div>
        <div class="movie-tagline" id="movie-tagline"></div>
        <div class="badges" id="badges"></div>
        <div class="badges" id="crew-info"></div>
        <div class="synopsis" id="synopsis"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Cast</div>
      <div class="cast-grid" id="cast-grid"></div>
      <p style="color:#666;font-size:0.8rem;margin-top:12px;">Click any actor name to swap them out</p>
    </div>

    <div class="section">
      <div class="section-title">Production Budget</div>
      <div class="budget-grid" id="budget-grid"></div>
    </div>

    <div class="section">
      <div class="section-title">Trailer Breakdown</div>
      <div class="trailer-scenes" id="trailer-scenes"></div>
    </div>

    <div class="save-bar">
      <button onclick="newMovie()">NEW MOVIE</button>
      <button onclick="shareMovie()">SHARE</button>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
