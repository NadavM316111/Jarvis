<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS Calorie Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CINEMATIC INTRO */
        #intro {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .intro-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            opacity: 0;
            transform: scale(0.5);
            background: linear-gradient(135deg, #00f5ff, #8b5cf6, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(0, 245, 255, 0.5);
            animation: introReveal 2s ease-out 0.5s forwards;
        }

        .intro-tagline {
            font-size: 1.2rem;
            color: #666;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 1s ease-out 2s forwards;
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .intro-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00f5ff;
            border-radius: 50%;
            animation: particleFloat 3s infinite;
        }

        @keyframes introReveal {
            0% { opacity: 0; transform: scale(0.5); filter: blur(20px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes particleFloat {
            0%, 100% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1); }
        }

        /* MAIN APP */
        #app {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #app.visible {
            display: block;
            opacity: 1;
        }

        /* ANIMATED BACKGROUND */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px),
                linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .glow-orb {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: orbFloat 10s ease-in-out infinite;
            z-index: -1;
        }

        .orb-1 { background: #00f5ff; top: -200px; left: -200px; }
        .orb-2 { background: #8b5cf6; bottom: -200px; right: -200px; animation-delay: -5s; }
        .orb-3 { background: #f59e0b; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -2.5s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
        }

        /* HEADER */
        header {
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,245,255,0.1);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00f5ff, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border: 2px solid #00f5ff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,245,255,0.5); }
            50% { box-shadow: 0 0 20px 10px rgba(0,245,255,0); }
        }

        .date-display {
            font-size: 1rem;
            color: #888;
            font-family: 'Orbitron', sans-serif;
        }

        /* STATS DASHBOARD */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 40px 50px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(20,20,30,0.8), rgba(10,10,15,0.9));
            border: 1px solid rgba(0,245,255,0.2);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,245,255,0.5);
            box-shadow: 0 20px 40px rgba(0,245,255,0.1);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00f5ff, #8b5cf6);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00f5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-unit {
            font-size: 1rem;
            color: #00f5ff;
            margin-left: 5px;
        }

        /* CIRCULAR PROGRESS */
        .progress-ring {
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.5s ease;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        /* MAIN CONTENT */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 20px 50px 50px;
        }

        .panel {
            background: linear-gradient(135deg, rgba(20,20,30,0.8), rgba(10,10,15,0.9));
            border: 1px solid rgba(0,245,255,0.2);
            border-radius: 20px;
            padding: 30px;
            position: relative;
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #00f5ff;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        /* FOOD INPUT */
        .food-input-container {
            position: relative;
            margin-bottom: 20px;
        }

        .food-input {
            width: 100%;
            padding: 20px 25px;
            font-size: 1.1rem;
            font-family: 'Rajdhani', sans-serif;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(0,245,255,0.3);
            border-radius: 15px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .food-input:focus {
            border-color: #00f5ff;
            box-shadow: 0 0 30px rgba(0,245,255,0.2);
        }

        .food-input::placeholder {
            color: #555;
        }

        .add-btn {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            background: linear-gradient(135deg, #00f5ff, #8b5cf6);
            border: none;
            border-radius: 15px;
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .add-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 40px rgba(0,245,255,0.4);
        }

        .add-btn:active {
            transform: scale(0.98);
        }

        /* FOOD LOG */
        .food-log {
            max-height: 400px;
            overflow-y: auto;
        }

        .food-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #00f5ff;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .food-name {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .food-calories {
            font-family: 'Orbitron', sans-serif;
            color: #00f5ff;
            font-weight: 700;
        }

        .delete-btn {
            background: rgba(255,50,50,0.2);
            border: 1px solid rgba(255,50,50,0.5);
            color: #ff5050;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-left: 15px;
        }

        .delete-btn:hover {
            background: rgba(255,50,50,0.4);
        }

        /* QUICK ADD BUTTONS */
        .quick-add {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .quick-btn {
            padding: 12px;
            font-size: 0.9rem;
            background: rgba(139,92,246,0.2);
            border: 1px solid rgba(139,92,246,0.4);
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .quick-btn:hover {
            background: rgba(139,92,246,0.4);
            transform: scale(1.05);
        }

        /* MACRO BARS */
        .macro-bar {
            margin-bottom: 20px;
        }

        .macro-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .macro-progress {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .macro-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .protein-fill { background: linear-gradient(90deg, #00f5ff, #00a5ff); }
        .carbs-fill { background: linear-gradient(90deg, #f59e0b, #f5620b); }
        .fat-fill { background: linear-gradient(90deg, #8b5cf6, #c45cff); }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(#00f5ff, #8b5cf6);
            border-radius: 10px;
        }

        /* RESPONSIVE */
        @media (max-width: 1200px) {
            .dashboard { grid-template-columns: repeat(2, 1fr); }
            .main-content { grid-template-columns: 1fr; }
        }

        @media (max-width: 600px) {
            .dashboard { grid-template-columns: 1fr; padding: 20px; }
            header { padding: 20px; }
            .main-content { padding: 20px; }
            .intro-text { font-size: 2rem; }
        }

        /* CALORIE GOAL INPUT */
        .goal-setting {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .goal-input {
            flex: 1;
            padding: 12px 15px;
            font-size: 1rem;
            font-family: 'Rajdhani', sans-serif;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 10px;
            color: #fff;
            outline: none;
        }

        .goal-btn {
            padding: 12px 25px;
            background: rgba(139,92,246,0.3);
            border: 1px solid rgba(139,92,246,0.5);
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
        }

        .goal-btn:hover {
            background: rgba(139,92,246,0.5);
        }

        /* HISTORY SECTION */
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .history-date { color: #888; }
        .history-cal { color: #00f5ff; font-family: 'Orbitron', sans-serif; }

        /* NOTIFICATIONS */
        .notification {
            position: fixed;
            top: 100px;
            right: 30px;
            padding: 20px 30px;
            background: linear-gradient(135deg, rgba(0,245,255,0.2), rgba(139,92,246,0.2));
            border: 1px solid rgba(0,245,255,0.5);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            animation: notifySlide 0.5s ease;
            z-index: 1000;
        }

        @keyframes notifySlide {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <!-- CINEMATIC INTRO -->
    <div id="intro">
        <div class="intro-particles" id="particles"></div>
        <div class="intro-text">NEXUS</div>
        <div class="intro-tagline">Nutrition Excellence Unified System</div>
    </div>

    <!-- MAIN APP -->
    <div id="app">
        <div class="bg-grid"></div>
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>

        <header>
            <div class="logo">
                <div class="logo-icon">N</div>
                NEXUS
            </div>
            <div class="date-display" id="dateDisplay"></div>
        </header>

        <div class="dashboard">
            <div class="stat-card">
                <div class="stat-label">Calories Today</div>
                <div class="stat-value" id="totalCalories">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Remaining</div>
                <div class="stat-value" id="remainingCalories">2000</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Daily Goal</div>
                <div class="stat-value" id="goalDisplay">2000</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Items Logged</div>
                <div class="stat-value" id="itemCount">0</div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <div class="panel-title">Add Food</div>
                
                <div class="goal-setting">
                    <input type="number" class="goal-input" id="goalInput" placeholder="Set daily goal...">
                    <button class="goal-btn" onclick="setGoal()">SET</button>
                </div>
                
                <div class="food-input-container">
                    <input type="text" class="food-input" id="foodInput" placeholder="What did you eat? (e.g., 2 eggs, chicken salad)">
                </div>
                <button class="add-btn" onclick="addFood()">Analyze + Add</button>
                
                <div class="quick-add">
                    <button class="quick-btn" onclick="quickAdd('Apple', 95)">Apple (95)</button>
                    <button class="quick-btn" onclick="quickAdd('Banana', 105)">Banana (105)</button>
                    <button class="quick-btn" onclick="quickAdd('Coffee', 5)">Coffee (5)</button>
                    <button class="quick-btn" onclick="quickAdd('Chicken Breast', 165)">Chicken (165)</button>
                    <button class="quick-btn" onclick="quickAdd('Rice Cup', 200)">Rice (200)</button>
                    <button class="quick-btn" onclick="quickAdd('Salad', 150)">Salad (150)</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">Today's Log</div>
                <div class="food-log" id="foodLog"></div>
            </div>

            <div class="panel">
                <div class="panel-title">Macro Breakdown</div>
                <div class="macro-bar">
                    <div class="macro-label">
                        <span>Protein</span>
                        <span id="proteinVal">0g / 150g</span>
                    </div>
                    <div class="macro-progress">
                        <div class="macro-fill protein-fill" id="proteinBar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="macro-bar">
                    <div class="macro-label">
                        <span>Carbohydrates</span>
                        <span id="carbsVal">0g / 250g</span>
                    </div>
                    <div class="macro-progress">
                        <div class="macro-fill carbs-fill" id="carbsBar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="macro-bar">
                    <div class="macro-label">
                        <span>Fat</span>
                        <span id="fatVal">0g / 65g</span>
                    </div>
                    <div class="macro-progress">
                        <div class="macro-fill fat-fill" id="fatBar" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">Weekly History</div>
                <div id="history"></div>
            </div>
        </div>
    </div>

    <script>
        // INTRO ANIMATION
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 3 + 's';
                particle.style.animationDuration = (2 + Math.random() * 2) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // Hide intro after animation
        setTimeout(() => {
            document.getElementById('intro').style.opacity = '0';
            document.getElementById('intro').style.transition = 'opacity 1s ease';
            document.getElementById('app').classList.add('visible');
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
            }, 1000);
        }, 3500);

        // APP DATA
        let dailyGoal = parseInt(localStorage.getItem('dailyGoal')) || 2000;
        let foodItems = JSON.parse(localStorage.getItem('foodItems')) || [];
        let history = JSON.parse(localStorage.getItem('history')) || [];

        // FOOD DATABASE (estimated calories)
        const foodDatabase = {
            'egg': 78, 'eggs': 78,
            'chicken': 165, 'chicken breast': 165,
            'rice': 130, 'white rice': 130, 'brown rice': 110,
            'bread': 80, 'toast': 80,
            'apple': 95, 'banana': 105, 'orange': 62,
            'milk': 150, 'coffee': 5, 'tea': 2,
            'pizza': 285, 'pizza slice': 285,
            'burger': 350, 'hamburger': 350,
            'salad': 150, 'caesar salad': 180,
            'pasta': 220, 'spaghetti': 220,
            'steak': 270, 'beef': 250,
            'salmon': 200, 'fish': 150,
            'yogurt': 100, 'greek yogurt': 130,
            'cheese': 110, 'sandwich': 350,
            'fries': 365, 'french fries': 365,
            'chips': 150, 'cookie': 50, 'cookies': 50,
            'ice cream': 200, 'cake': 250,
            'avocado': 160, 'oatmeal': 150,
            'cereal': 120, 'pancake': 90, 'pancakes': 270,
            'waffle': 95, 'bacon': 45,
            'sausage': 85, 'hot dog': 150,
            'tacos': 170, 'burrito': 430,
            'sushi': 40, 'ramen': 380,
            'soup': 100, 'water': 0
        };

        // UPDATE DATE
        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', options);
        }
        updateDate();

        // SET GOAL
        function setGoal() {
            const input = document.getElementById('goalInput');
            if (input.value) {
                dailyGoal = parseInt(input.value);
                localStorage.setItem('dailyGoal', dailyGoal);
                updateDisplay();
                showNotification('Goal updated to ' + dailyGoal + ' calories');
                input.value = '';
            }
        }

        // ESTIMATE CALORIES
        function estimateCalories(food) {
            const lower = food.toLowerCase();
            
            // Check for quantity
            const match = lower.match(/(\d+)\s*(.*)/);
            let quantity = 1;
            let foodName = lower;
            
            if (match) {
                quantity = parseInt(match[1]);
                foodName = match[2].trim();
            }
            
            // Find in database
            for (let key in foodDatabase) {
                if (foodName.includes(key)) {
                    return foodDatabase[key] * quantity;
                }
            }
            
            // Default estimate
            return 150;
        }

        // ESTIMATE MACROS
        function estimateMacros(food, calories) {
            // Rough estimates based on food type
            const lower = food.toLowerCase();
            let protein = 0, carbs = 0, fat = 0;
            
            if (lower.includes('chicken') || lower.includes('beef') || lower.includes('fish') || lower.includes('egg')) {
                protein = Math.round(calories * 0.4 / 4);
                carbs = Math.round(calories * 0.1 / 4);
                fat = Math.round(calories * 0.5 / 9);
            } else if (lower.includes('rice') || lower.includes('bread') || lower.includes('pasta')) {
                protein = Math.round(calories * 0.1 / 4);
                carbs = Math.round(calories * 0.8 / 4);
                fat = Math.round(calories * 0.1 / 9);
            } else {
                protein = Math.round(calories * 0.2 / 4);
                carbs = Math.round(calories * 0.5 / 4);
                fat = Math.round(calories * 0.3 / 9);
            }
            
            return { protein, carbs, fat };
        }

        // ADD FOOD
        function addFood() {
            const input = document.getElementById('foodInput');
            const food = input.value.trim();
            
            if (food) {
                const calories = estimateCalories(food);
                const macros = estimateMacros(food, calories);
                
                foodItems.push({
                    name: food,
                    calories: calories,
                    ...macros,
                    time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
                });
                
                localStorage.setItem('foodItems', JSON.stringify(foodItems));
                updateDisplay();
                showNotification(food + ' added: ' + calories + ' calories');
                input.value = '';
            }
        }

        // QUICK ADD
        function quickAdd(name, calories) {
            const macros = estimateMacros(name, calories);
            foodItems.push({
                name: name,
                calories: calories,
                ...macros,
                time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
            });
            localStorage.setItem('foodItems', JSON.stringify(foodItems));
            updateDisplay();
            showNotification(name + ' added: ' + calories + ' calories');
        }

        // DELETE FOOD
        function deleteFood(index) {
            foodItems.splice(index, 1);
            localStorage.setItem('foodItems', JSON.stringify(foodItems));
            updateDisplay();
        }

        // UPDATE DISPLAY
        function updateDisplay() {
            const totalCal = foodItems.reduce((sum, item) => sum + item.calories, 0);
            const remaining = dailyGoal - totalCal;
            const totalProtein = foodItems.reduce((sum, item) => sum + (item.protein || 0), 0);
            const totalCarbs = foodItems.reduce((sum, item) => sum + (item.carbs || 0), 0);
            const totalFat = foodItems.reduce((sum, item) => sum + (item.fat || 0), 0);
            
            document.getElementById('totalCalories').textContent = totalCal;
            document.getElementById('remainingCalories').textContent = remaining;
            document.getElementById('remainingCalories').style.color = remaining < 0 ? '#ff5050' : '#00f5ff';
            document.getElementById('goalDisplay').textContent = dailyGoal;
            document.getElementById('itemCount').textContent = foodItems.length;
            
            // Macros
            document.getElementById('proteinVal').textContent = totalProtein + 'g / 150g';
            document.getElementById('carbsVal').textContent = totalCarbs + 'g / 250g';
            document.getElementById('fatVal').textContent = totalFat + 'g / 65g';
            
            document.getElementById('proteinBar').style.width = Math.min((totalProtein / 150) * 100, 100) + '%';
            document.getElementById('carbsBar').style.width = Math.min((totalCarbs / 250) * 100, 100) + '%';
            document.getElementById('fatBar').style.width = Math.min((totalFat / 65) * 100, 100) + '%';
            
            // Food log
            const logHtml = foodItems.map((item, index) => `
                <div class="food-item">
                    <div>
                        <div class="food-name">${item.name}</div>
                        <small style="color:#666">${item.time}</small>
                    </div>
                    <div style="display:flex;align-items:center">
                        <span class="food-calories">${item.calories} cal</span>
                        <button class="delete-btn" onclick="deleteFood(${index})">X</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('foodLog').innerHTML = logHtml || '<p style="color:#555;text-align:center;padding:40px;">No food logged yet today</p>';
            
            // History
            updateHistory();
        }

        // UPDATE HISTORY
        function updateHistory() {
            const historyHtml = history.slice(-7).reverse().map(day => `
                <div class="history-item">
                    <span class="history-date">${day.date}</span>
                    <span class="history-cal">${day.calories} cal</span>
                </div>
            `).join('');
            document.getElementById('history').innerHTML = historyHtml || '<p style="color:#555;text-align:center;padding:20px;">No history yet</p>';
        }

        // SAVE DAY TO HISTORY (at midnight or manual)
        function saveDayToHistory() {
            const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            const totalCal = foodItems.reduce((sum, item) => sum + item.calories, 0);
            
            // Check if today already exists
            const existingIndex = history.findIndex(h => h.date === today);
            if (existingIndex >= 0) {
                history[existingIndex].calories = totalCal;
            } else {
                history.push({ date: today, calories: totalCal });
            }
            
            localStorage.setItem('history', JSON.stringify(history));
        }

        // NOTIFICATION
        function showNotification(message) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => {
                notif.style.opacity = '0';
                notif.style.transition = 'opacity 0.5s';
                setTimeout(() => notif.remove(), 500);
            }, 3000);
        }

        // ENTER KEY
        document.getElementById('foodInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addFood();
        });

        document.getElementById('goalInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') setGoal();
        });

        // AUTO-SAVE HISTORY
        setInterval(saveDayToHistory, 60000);

        // INIT
        updateDisplay();
    </script>
</body>
</html>
