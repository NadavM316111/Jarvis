<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse - Anonymous Confessions</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="pulse-icon"></span>
        <h1>Pulse</h1>
      </div>
      <p class="tagline">Anonymous confessions. Real reactions.</p>
    </header>

    <!-- Compose Section -->
    <div class="compose-card">
      <div class="compose-header">
        <div class="anon-avatar">?</div>
        <span>Share anonymously...</span>
      </div>
      <textarea id="confessionInput" placeholder="What's on your mind? Your identity stays hidden..." maxlength="500"></textarea>
      <div class="compose-footer">
        <span class="char-count"><span id="charCount">0</span>/500</span>
        <button id="postBtn" class="post-btn" disabled>
          <span>Post Confession</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Feed Tabs -->
    <div class="feed-tabs">
      <button class="tab active" data-sort="hot">
        <span class="fire-icon">~</span> Hot
      </button>
      <button class="tab" data-sort="new">
        <span class="new-icon">*</span> New
      </button>
    </div>

    <!-- Posts Feed -->
    <div id="feed" class="feed">
      <div class="loading-spinner">
        <div class="spinner"></div>
        <p>Loading confessions...</p>
      </div>
    </div>

    <!-- Post Modal -->
    <div id="postModal" class="modal">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <button class="modal-close">&times;</button>
        <div id="modalBody"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
