<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dress To Impress - Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --coral: #FF6B6B;
            --turquoise: #4ECDC4;
            --golden: #FFE66D;
            --pink: #FF8ED4;
            --white: #FFFFFF;
            --dark: #2D3436;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #FFF5F5 0%, #F0FFFF 50%, #FFFEF0 100%);
            min-height: 100vh;
            color: var(--dark);
        }
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 30px rgba(0,0,0,0.1);
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--coral), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .nav-links a:hover { color: var(--coral); }
        .checkout-container {
            padding: 120px 50px 50px;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 40px;
        }
        .checkout-form-section { flex: 1.2; }
        .checkout-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--coral), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .checkout-subtitle { color: #666; margin-bottom: 30px; }
        .form-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        .form-section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-section h3 i { color: var(--coral); }
        .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .form-group { flex: 1; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #555;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--coral);
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
        }
        .form-group input.error {
            border-color: #ff4444;
            animation: shake 0.5s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .card-icons { display: flex; gap: 10px; margin-bottom: 20px; }
        .card-icons i { font-size: 2rem; opacity: 0.4; transition: all 0.3s; }
        .card-icons i.active { opacity: 1; color: var(--coral); }
        .order-summary-section {
            flex: 0.8;
            position: sticky;
            top: 120px;
            align-self: flex-start;
        }
        .order-summary {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }
        .order-summary h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .order-items { max-height: 300px; overflow-y: auto; margin-bottom: 20px; }
        .order-item {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f5f5f5;
        }
        .order-item:last-child { border-bottom: none; }
        .order-item-image {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .order-item-image i { font-size: 1.5rem; opacity: 0.5; color: white; }
        .order-item-info { flex: 1; }
        .order-item-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 3px; }
        .order-item-variant { font-size: 0.8rem; color: #888; }
        .order-item-price { font-weight: 600; color: var(--coral); }
        .promo-code { display: flex; gap: 10px; margin-bottom: 25px; }
        .promo-code input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }
        .promo-code input:focus { border-color: var(--coral); }
        .promo-code button {
            padding: 12px 20px;
            background: var(--dark);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .promo-code button:hover { background: var(--coral); }
        .order-totals { padding-top: 20px; border-top: 2px solid #f0f0f0; }
        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }
        .total-row.discount { color: var(--turquoise); }
        .total-row.grand-total {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #eee;
        }
        .place-order-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--coral), var(--pink));
            color: white;
            border: none;
            border-radius: 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .place-order-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }
        .place-order-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .secure-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #888;
        }
        .secure-badge i { color: var(--turquoise); }
        .empty-cart { text-align: center; padding: 60px 20px; width: 100%; }
        .empty-cart i { font-size: 4rem; color: #ddd; margin-bottom: 20px; }
        .empty-cart h3 { font-family: 'Playfair Display', serif; margin-bottom: 10px; }
        .empty-cart p { color: #888; margin-bottom: 25px; }
        .empty-cart a {
            display: inline-block;
            padding: 14px 35px;
            background: linear-gradient(135deg, var(--coral), var(--pink));
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .empty-cart a:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }
        .success-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s;
        }
        .success-modal.active { opacity: 1; visibility: visible; }
        .success-content {
            background: white;
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            max-width: 500px;
            transform: scale(0.8);
            transition: all 0.4s;
        }
        .success-modal.active .success-content { transform: scale(1); }
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--turquoise), var(--coral));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            animation: successPulse 2s infinite;
        }
        @keyframes successPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(78, 205, 196, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(78, 205, 196, 0); }
        }
        .success-icon i { font-size: 3rem; color: white; }
        .success-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--coral), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .success-content p { color: #666; margin-bottom: 10px; font-size: 1rem; }
        .order-number {
            font-family: monospace;
            background: #f8f9fa;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            margin: 20px 0;
            color: var(--dark);
        }
        .success-content .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, var(--coral), var(--pink));
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s;
        }
        .success-content .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }
        .processing { display: none; }
        .processing.active { display: flex; align-items: center; gap: 10px; }
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 900px) {
            .checkout-container {
                flex-direction: column;
                padding: 100px 20px 30px;
            }
            .order-summary-section { position: relative; top: 0; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="soleil.html" class="logo">Dress To Impress</a>
        <ul class="nav-links">
            <li><a href="soleil.html">Home</a></li>
            <li><a href="soleil-shop.html">Shop</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="checkout-container" id="checkoutContainer"></div>

    <div class="success-modal" id="successModal">
        <div class="success-content">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h2>Order Confirmed!</h2>
            <p>Thank you for shopping with Dress To Impress</p>
            <p>A confirmation email has been sent to your inbox</p>
            <div class="order-number" id="orderNumber">DTI-000000</div>
            <a href="soleil-shop.html" class="btn">Continue Shopping</a>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('dtiCart') || '[]');
        let discount = 0;
        let promoApplied = false;

        function renderCheckout() {
            const container = document.getElementById('checkoutContainer');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-bag"></i>
                        <h3>Your Cart is Empty</h3>
                        <p>Looks like you haven't added any items yet</p>
                        <a href="soleil-shop.html">Start Shopping</a>
                    </div>
                `;
                return;
            }

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = subtotal > 75 ? 0 : 9.99;
            const tax = subtotal * 0.07;
            const total = subtotal + shipping + tax - discount;
            const itemCount = cart.reduce((sum, item) => sum + item.quantity, 0);

            let itemsHTML = '';
            cart.forEach(item => {
                itemsHTML += `
                    <div class="order-item">
                        <div class="order-item-image" style="background: ${item.bg}">
                            <i class="fas fa-tshirt"></i>
                        </div>
                        <div class="order-item-info">
                            <p class="order-item-name">${item.name}</p>
                            <p class="order-item-variant">Size: ${item.size} | Qty: ${item.quantity}</p>
                            <p class="order-item-price">$${(item.price * item.quantity).toFixed(2)}</p>
                        </div>
                    </div>
                `;
            });

            let discountHTML = '';
            if (discount > 0) {
                discountHTML = `
                    <div class="total-row discount">
                        <span>Promo Discount</span>
                        <span>-$${discount.toFixed(2)}</span>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="checkout-form-section">
                    <h1 class="checkout-title">Checkout</h1>
                    <p class="checkout-subtitle">Complete your order in just a few steps</p>

                    <div class="form-section">
                        <h3><i class="fas fa-user"></i> Contact Information</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="email" placeholder="your@email.com">
                            </div>
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" id="phone" placeholder="(555) 123-4567">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3><i class="fas fa-truck"></i> Shipping Address</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>First Name</label>
                                <input type="text" id="firstName" placeholder="Jane">
                            </div>
                            <div class="form-group">
                                <label>Last Name</label>
                                <input type="text" id="lastName" placeholder="Doe">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Street Address</label>
                            <input type="text" id="address" placeholder="123 Summer Lane">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" id="city" placeholder="Miami">
                            </div>
                            <div class="form-group">
                                <label>State</label>
                                <select id="state">
                                    <option value="">Select State</option>
                                    <option value="FL" selected>Florida</option>
                                    <option value="CA">California</option>
                                    <option value="NY">New York</option>
                                    <option value="TX">Texas</option>
                                    <option value="GA">Georgia</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>ZIP Code</label>
                                <input type="text" id="zip" placeholder="33101">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3><i class="fas fa-credit-card"></i> Payment Details</h3>
                        <div class="card-icons">
                            <i class="fab fa-cc-visa" id="visaIcon"></i>
                            <i class="fab fa-cc-mastercard" id="mcIcon"></i>
                            <i class="fab fa-cc-amex" id="amexIcon"></i>
                            <i class="fab fa-cc-discover" id="discoverIcon"></i>
                        </div>
                        <div class="form-group">
                            <label>Card Number</label>
                            <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" oninput="formatCard(this)">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Expiration Date</label>
                                <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)">
                            </div>
                            <div class="form-group">
                                <label>CVV</label>
                                <input type="text" id="cvv" placeholder="123" maxlength="4">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Name on Card</label>
                            <input type="text" id="cardName" placeholder="JANE DOE">
                        </div>
                    </div>
                </div>

                <div class="order-summary-section">
                    <div class="order-summary">
                        <h3>Order Summary (${itemCount} items)</h3>
                        <div class="order-items">${itemsHTML}</div>
                        <div class="promo-code">
                            <input type="text" id="promoInput" placeholder="Promo code" ${promoApplied ? 'disabled' : ''}>
                            <button onclick="applyPromo()" ${promoApplied ? 'disabled' : ''}>Apply</button>
                        </div>
                        <div class="order-totals">
                            <div class="total-row">
                                <span>Subtotal</span>
                                <span>$${subtotal.toFixed(2)}</span>
                            </div>
                            <div class="total-row">
                                <span>Shipping</span>
                                <span>${shipping === 0 ? 'FREE' : '$' + shipping.toFixed(2)}</span>
                            </div>
                            <div class="total-row">
                                <span>Tax (7%)</span>
                                <span>$${tax.toFixed(2)}</span>
                            </div>
                            ${discountHTML}
                            <div class="total-row grand-total">
                                <span>Total</span>
                                <span>$${total.toFixed(2)}</span>
                            </div>
                        </div>
                        <button class="place-order-btn" onclick="placeOrder()">
                            <span class="btn-text">Place Order</span>
                            <span class="processing" id="processing">
                                <div class="spinner"></div>
                                Processing...
                            </span>
                            <i class="fas fa-arrow-right btn-arrow"></i>
                        </button>
                        <div class="secure-badge">
                            <i class="fas fa-shield-alt"></i>
                            <span>Secure checkout - SSL encrypted</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function formatCard(input) {
            let value = input.value.replace(/\D/g, '');
            value = value.replace(/(\d{4})(?=\d)/g, '$1 ');
            input.value = value;
            
            const icons = ['visaIcon', 'mcIcon', 'amexIcon', 'discoverIcon'];
            icons.forEach(id => document.getElementById(id) && document.getElementById(id).classList.remove('active'));
            
            if (value.startsWith('4')) {
                document.getElementById('visaIcon').classList.add('active');
            } else if (/^5[1-5]/.test(value)) {
                document.getElementById('mcIcon').classList.add('active');
            } else if (/^3[47]/.test(value)) {
                document.getElementById('amexIcon').classList.add('active');
            } else if (/^6011/.test(value)) {
                document.getElementById('discoverIcon').classList.add('active');
            }
        }

        function formatExpiry(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length >= 2) {
                value = value.substring(0, 2) + '/' + value.substring(2);
            }
            input.value = value;
        }

        function applyPromo() {
            const code = document.getElementById('promoInput').value.toUpperCase();
            const validCodes = { 'SUMMER20': 0.20, 'WELCOME10': 0.10, 'VIP25': 0.25, 'DRESS15': 0.15 };
            
            if (validCodes[code]) {
                const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                discount = subtotal * validCodes[code];
                promoApplied = true;
                renderCheckout();
                showToast('Promo code applied! You saved $' + discount.toFixed(2));
            } else {
                showToast('Invalid promo code', true);
            }
        }

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                background: ${isError ? '#ff4444' : 'var(--turquoise)'};
                color: white;
                padding: 15px 30px;
                border-radius: 50px;
                font-weight: 500;
                z-index: 3000;
            `;
            toast.innerHTML = '<i class="fas fa-' + (isError ? 'times' : 'check') + '-circle"></i> ' + message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function validateForm() {
            const fields = ['email', 'phone', 'firstName', 'lastName', 'address', 'city', 'state', 'zip', 'cardNumber', 'expiry', 'cvv', 'cardName'];
            let valid = true;
            
            fields.forEach(field => {
                const input = document.getElementById(field);
                if (input && !input.value.trim()) {
                    input.classList.add('error');
                    valid = false;
                    setTimeout(() => input.classList.remove('error'), 500);
                }
            });
            
            const email = document.getElementById('email');
            if (email && (!email.value.includes('@') || !email.value.includes('.'))) {
                email.classList.add('error');
                valid = false;
            }
            
            return valid;
        }

        function placeOrder() {
            if (!validateForm()) {
                showToast('Please fill in all required fields', true);
                return;
            }
            
            const btn = document.querySelector('.place-order-btn');
            const btnText = btn.querySelector('.btn-text');
            const btnArrow = btn.querySelector('.btn-arrow');
            const processing = document.getElementById('processing');
            
            btn.disabled = true;
            btnText.style.display = 'none';
            btnArrow.style.display = 'none';
            processing.classList.add('active');
            
            setTimeout(() => {
                const orderNum = 'DTI-' + Date.now().toString().slice(-6);
                document.getElementById('orderNumber').textContent = orderNum;
                
                localStorage.removeItem('dtiCart');
                cart = [];
                
                document.getElementById('successModal').classList.add('active');
                
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnArrow.style.display = 'inline';
                processing.classList.remove('active');
            }, 2500);
        }

        renderCheckout();
    </script>
</body>
</html>
