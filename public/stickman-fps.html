<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Stickman Survival FPS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
        #gameCanvas { display: block; }
        #blocker {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }
        #blocker h1 { color: #ff4444; font-size: 48px; margin-bottom: 20px; text-shadow: 0 0 20px #ff0000; }
        #blocker p { color: #fff; font-size: 18px; margin: 5px 0; }
        #blocker .start-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 24px;
            background: #ff4444;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }
        #blocker .start-btn:hover { background: #ff6666; transform: scale(1.1); }
        #hud {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
        }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 30px; height: 30px;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.9);
        }
        #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
        #crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
        #healthBar {
            position: absolute;
            bottom: 30px; left: 30px;
            width: 250px; height: 25px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #ff4444;
            border-radius: 5px;
            overflow: hidden;
        }
        #healthFill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff4444, #ff6666);
            transition: width 0.3s;
        }
        #healthText {
            position: absolute;
            bottom: 60px; left: 30px;
            color: #fff;
            font-size: 16px;
        }
        #ammoDisplay {
            position: absolute;
            bottom: 30px; right: 30px;
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #waveDisplay {
            position: absolute;
            top: 30px; left: 50%;
            transform: translateX(-50%);
            color: #ff4444;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #killCount {
            position: absolute;
            top: 70px; left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 20px;
        }
        #damageOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(255,0,0,0.4) 100%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
            z-index: 40;
        }
        #gunModel {
            position: fixed;
            bottom: -20px;
            right: 50px;
            width: 350px;
            height: 200px;
            z-index: 30;
            pointer-events: none;
        }
        #reloadText {
            position: absolute;
            bottom: 70px; right: 30px;
            color: #ffaa00;
            font-size: 18px;
            display: none;
        }
        #gameOver {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 200;
        }
        #gameOver h1 { color: #ff4444; font-size: 64px; margin-bottom: 20px; }
        #gameOver p { color: #fff; font-size: 24px; margin: 10px 0; }
        #gameOver button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 24px;
            background: #ff4444;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .muzzle-flash {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100px; height: 100px;
            background: radial-gradient(circle, rgba(255,200,50,0.8) 0%, transparent 70%);
            pointer-events: none;
            z-index: 35;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div id="blocker">
        <h1>STICKMAN SURVIVAL</h1>
        <p>WASD - Move | Mouse - Aim | Click - Shoot | R - Reload | Shift - Sprint</p>
        <p>Survive the stickman waves!</p>
        <button class="start-btn" onclick="startGame()">CLICK TO PLAY</button>
    </div>
    
    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">
        <div id="crosshair"></div>
        <div id="healthBar"><div id="healthFill"></div></div>
        <div id="healthText">HEALTH</div>
        <div id="ammoDisplay">30 / 90</div>
        <div id="reloadText">RELOADING...</div>
        <div id="waveDisplay">WAVE 1</div>
        <div id="killCount">Kills: 0</div>
    </div>
    
    <div id="damageOverlay"></div>
    <div class="muzzle-flash" id="muzzleFlash"></div>
    
    <svg id="gunModel" viewBox="0 0 350 200">
        <rect x="50" y="80" width="200" height="40" fill="#333" rx="5"/>
        <rect x="230" y="70" width="80" height="60" fill="#444" rx="3"/>
        <rect x="140" y="100" width="30" height="70" fill="#555" rx="3"/>
        <rect x="40" y="85" width="30" height="30" fill="#222" rx="10"/>
        <rect x="290" y="80" width="40" height="10" fill="#666"/>
        <rect x="290" y="110" width="40" height="10" fill="#666"/>
    </svg>
    
    <div id="gameOver">
        <h1>GAME OVER</h1>
        <p>You survived <span id="finalWave">0</span> waves</p>
        <p>Total kills: <span id="finalKills">0</span></p>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Game state
        let gameStarted = false;
        let health = 100;
        let ammo = 30;
        let reserveAmmo = 90;
        let wave = 1;
        let kills = 0;
        let isReloading = false;
        let enemies = [];
        let bullets = [];
        let enemyBullets = [];
        
        // Three.js setup
        let scene, camera, renderer;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let isSprinting = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let playerPosition = new THREE.Vector3(0, 2, 0);
        
        // Mouse look
        let yaw = 0, pitch = 0;
        const sensitivity = 0.002;
        
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 10, 150);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.copy(playerPosition);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(50, 100, 50);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            // Red point lights for atmosphere
            const redLight1 = new THREE.PointLight(0xff0000, 0.5, 50);
            redLight1.position.set(20, 10, 20);
            scene.add(redLight1);
            
            const redLight2 = new THREE.PointLight(0xff0000, 0.5, 50);
            redLight2.position.set(-20, 10, -20);
            scene.add(redLight2);
            
            // Ground
            const groundGeometry = new THREE.PlaneGeometry(200, 200);
            const groundMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x222222,
                roughness: 0.9
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Grid lines on ground
            const gridHelper = new THREE.GridHelper(200, 50, 0x444444, 0x333333);
            scene.add(gridHelper);
            
            // Walls/Obstacles
            createEnvironment();
            
            // Event listeners
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', onShoot);
            document.addEventListener('contextmenu', e => e.preventDefault());
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function createEnvironment() {
            const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x333344 });
            
            // Create some cover objects
            for (let i = 0; i < 15; i++) {
                const size = 2 + Math.random() * 4;
                const height = 2 + Math.random() * 4;
                const geometry = new THREE.BoxGeometry(size, height, size);
                const wall = new THREE.Mesh(geometry, wallMaterial);
                wall.position.set(
                    (Math.random() - 0.5) * 80,
                    height / 2,
                    (Math.random() - 0.5) * 80
                );
                wall.castShadow = true;
                wall.receiveShadow = true;
                scene.add(wall);
            }
            
            // Outer walls
            const outerWallMaterial = new THREE.MeshStandardMaterial({ color: 0x442222 });
            const wallGeometry = new THREE.BoxGeometry(200, 15, 2);
            
            const wall1 = new THREE.Mesh(wallGeometry, outerWallMaterial);
            wall1.position.set(0, 7.5, -100);
            scene.add(wall1);
            
            const wall2 = new THREE.Mesh(wallGeometry, outerWallMaterial);
            wall2.position.set(0, 7.5, 100);
            scene.add(wall2);
            
            const wallGeometry2 = new THREE.BoxGeometry(2, 15, 200);
            const wall3 = new THREE.Mesh(wallGeometry2, outerWallMaterial);
            wall3.position.set(-100, 7.5, 0);
            scene.add(wall3);
            
            const wall4 = new THREE.Mesh(wallGeometry2, outerWallMaterial);
            wall4.position.set(100, 7.5, 0);
            scene.add(wall4);
        }
        
        function createStickman(x, z) {
            const stickman = new THREE.Group();
            
            const material = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 });
            
            // Head
            const headGeometry = new THREE.SphereGeometry(0.4, 16, 16);
            const head = new THREE.Mesh(headGeometry, material);
            head.position.y = 2.2;
            stickman.add(head);
            
            // Body
            const bodyGeometry = new THREE.CylinderGeometry(0.1, 0.1, 1.2, 8);
            const body = new THREE.Mesh(bodyGeometry, material);
            body.position.y = 1.4;
            stickman.add(body);
            
            // Arms
            const armGeometry = new THREE.CylinderGeometry(0.06, 0.06, 0.8, 8);
            
            const leftArm = new THREE.Mesh(armGeometry, material);
            leftArm.position.set(-0.4, 1.6, 0);
            leftArm.rotation.z = Math.PI / 4;
            stickman.add(leftArm);
            
            const rightArm = new THREE.Mesh(armGeometry, material);
            rightArm.position.set(0.4, 1.6, 0);
            rightArm.rotation.z = -Math.PI / 4;
            stickman.add(rightArm);
            
            // Legs
            const legGeometry = new THREE.CylinderGeometry(0.08, 0.08, 1, 8);
            
            const leftLeg = new THREE.Mesh(legGeometry, material);
            leftLeg.position.set(-0.2, 0.5, 0);
            stickman.add(leftLeg);
            
            const rightLeg = new THREE.Mesh(legGeometry, material);
            rightLeg.position.set(0.2, 0.5, 0);
            stickman.add(rightLeg);
            
            // Gun in hand
            const gunGeometry = new THREE.BoxGeometry(0.6, 0.15, 0.1);
            const gunMaterial = new THREE.MeshStandardMaterial({ color: 0x222222 });
            const gun = new THREE.Mesh(gunGeometry, gunMaterial);
            gun.position.set(0.7, 1.5, 0.3);
            stickman.add(gun);
            
            stickman.position.set(x, 0, z);
            stickman.castShadow = true;
            
            scene.add(stickman);
            
            return {
                mesh: stickman,
                health: 30 + wave * 10,
                speed: 0.02 + wave * 0.003, // Slow movement
                lastShot: 0,
                shootCooldown: 2000 - wave * 100 // Shoots every 2 seconds, faster each wave
            };
        }
        
        function spawnWave() {
            const enemyCount = Math.min(2 + wave, 8);
            for (let i = 0; i < enemyCount; i++) {
                const angle = (i / enemyCount) * Math.PI * 2;
                const distance = 30 + Math.random() * 20;
                const x = Math.cos(angle) * distance;
                const z = Math.sin(angle) * distance;
                enemies.push(createStickman(x, z));
            }
        }
        
        function onKeyDown(e) {
            if (!gameStarted) return;
            switch(e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
                case 'ShiftLeft': isSprinting = true; break;
                case 'KeyR': reload(); break;
            }
        }
        
        function onKeyUp(e) {
            switch(e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
                case 'ShiftLeft': isSprinting = false; break;
            }
        }
        
        function onMouseMove(e) {
            if (!gameStarted || document.pointerLockElement !== document.body) return;
            
            yaw -= e.movementX * sensitivity;
            pitch -= e.movementY * sensitivity;
            pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
            
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
        }
        
        function onShoot() {
            if (!gameStarted) return;
            if (document.pointerLockElement !== document.body) {
                document.body.requestPointerLock();
                return;
            }
            
            if (isReloading || ammo <= 0) {
                if (ammo <= 0 && reserveAmmo > 0) reload();
                return;
            }
            
            ammo--;
            updateHUD();
            
            // Muzzle flash
            const flash = document.getElementById('muzzleFlash');
            flash.style.opacity = '1';
            setTimeout(() => flash.style.opacity = '0', 50);
            
            // Gun recoil animation
            const gun = document.getElementById('gunModel');
            gun.style.transform = 'translateY(-10px)';
            setTimeout(() => gun.style.transform = '', 100);
            
            // Raycasting for hit detection
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            
            // Create bullet tracer
            const bulletGeometry = new THREE.SphereGeometry(0.1, 4, 4);
            const bulletMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const bullet = new THREE.Mesh(bulletGeometry, bulletMaterial);
            bullet.position.copy(camera.position);
            
            const bulletDir = new THREE.Vector3();
            camera.getWorldDirection(bulletDir);
            bullet.userData.direction = bulletDir;
            bullet.userData.speed = 2;
            bullet.userData.distance = 0;
            scene.add(bullet);
            bullets.push(bullet);
            
            // Check enemy hits
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                const intersects = raycaster.intersectObjects(enemy.mesh.children, true);
                
                if (intersects.length > 0 && intersects[0].distance < 100) {
                    enemy.health -= 25;
                    
                    // Hit effect - flash white
                    enemy.mesh.children.forEach(child => {
                        if (child.material) {
                            child.material.emissive.setHex(0xffffff);
                            setTimeout(() => child.material.emissive.setHex(0x330000), 100);
                        }
                    });
                    
                    if (enemy.health <= 0) {
                        scene.remove(enemy.mesh);
                        enemies.splice(i, 1);
                        kills++;
                        updateHUD();
                        
                        // Check wave complete
                        if (enemies.length === 0) {
                            wave++;
                            updateHUD();
                            setTimeout(spawnWave, 2000);
                        }
                    }
                    break;
                }
            }
        }
        
        function reload() {
            if (isReloading || ammo === 30 || reserveAmmo === 0) return;
            
            isReloading = true;
            document.getElementById('reloadText').style.display = 'block';
            
            setTimeout(() => {
                const needed = 30 - ammo;
                const toReload = Math.min(needed, reserveAmmo);
                ammo += toReload;
                reserveAmmo -= toReload;
                isReloading = false;
                document.getElementById('reloadText').style.display = 'none';
                updateHUD();
            }, 1500);
        }
        
        function updateHUD() {
            document.getElementById('healthFill').style.width = health + '%';
            document.getElementById('ammoDisplay').textContent = ammo + ' / ' + reserveAmmo;
            document.getElementById('waveDisplay').textContent = 'WAVE ' + wave;
            document.getElementById('killCount').textContent = 'Kills: ' + kills;
        }
        
        function takeDamage(amount) {
            health -= amount;
            document.getElementById('damageOverlay').style.opacity = '0.5';
            setTimeout(() => document.getElementById('damageOverlay').style.opacity = '0', 200);
            
            updateHUD();
            
            if (health <= 0) {
                gameOver();
            }
        }
        
        function gameOver() {
            gameStarted = false;
            document.exitPointerLock();
            document.getElementById('gameOver').style.display = 'flex';
            document.getElementById('finalWave').textContent = wave;
            document.getElementById('finalKills').textContent = kills;
        }
        
        function enemyShoot(enemy) {
            const bulletGeometry = new THREE.SphereGeometry(0.15, 4, 4);
            const bulletMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const bullet = new THREE.Mesh(bulletGeometry, bulletMaterial);
            
            // Start from enemy position
            bullet.position.copy(enemy.mesh.position);
            bullet.position.y = 1.5;
            
            // Direction towards player
            const dir = new THREE.Vector3();
            dir.subVectors(camera.position, bullet.position).normalize();
            
            // Add some inaccuracy
            dir.x += (Math.random() - 0.5) * 0.1;
            dir.y += (Math.random() - 0.5) * 0.1;
            dir.z += (Math.random() - 0.5) * 0.1;
            dir.normalize();
            
            bullet.userData.direction = dir;
            bullet.userData.speed = 0.5;
            bullet.userData.distance = 0;
            
            scene.add(bullet);
            enemyBullets.push(bullet);
        }
        
        function update() {
            if (!gameStarted) return;
            
            // Player movement
            const speed = isSprinting ? 0.25 : 0.15;
            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();
            
            if (moveForward || moveBackward) {
                velocity.z = direction.z * speed;
            }
            if (moveLeft || moveRight) {
                velocity.x = direction.x * speed;
            }
            
            // Apply movement relative to camera direction
            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();
            
            const right = new THREE.Vector3();
            right.crossVectors(forward, new THREE.Vector3(0, 1, 0));
            
            camera.position.addScaledVector(forward, velocity.z);
            camera.position.addScaledVector(right, velocity.x);
            
            // Keep player in bounds
            camera.position.x = Math.max(-95, Math.min(95, camera.position.x));
            camera.position.z = Math.max(-95, Math.min(95, camera.position.z));
            camera.position.y = 2;
            
            velocity.multiplyScalar(0.8);
            
            // Update enemies - move slowly towards player and shoot
            const now = Date.now();
            enemies.forEach(enemy => {
                // Move slowly towards player
                const dirToPlayer = new THREE.Vector3();
                dirToPlayer.subVectors(camera.position, enemy.mesh.position);
                dirToPlayer.y = 0;
                const distToPlayer = dirToPlayer.length();
                dirToPlayer.normalize();
                
                // Only move if far from player (keep distance of ~20 units)
                if (distToPlayer > 20) {
                    enemy.mesh.position.x += dirToPlayer.x * enemy.speed;
                    enemy.mesh.position.z += dirToPlayer.z * enemy.speed;
                } else if (distToPlayer < 15) {
                    // Back up if too close
                    enemy.mesh.position.x -= dirToPlayer.x * enemy.speed;
                    enemy.mesh.position.z -= dirToPlayer.z * enemy.speed;
                }
                
                // Face player
                enemy.mesh.lookAt(new THREE.Vector3(camera.position.x, 0, camera.position.z));
                
                // Shoot at player
                if (now - enemy.lastShot > enemy.shootCooldown) {
                    enemyShoot(enemy);
                    enemy.lastShot = now;
                }
                
                // Walking animation
                const time = now * 0.005;
                enemy.mesh.children[4].rotation.x = Math.sin(time) * 0.3; // Left leg
                enemy.mesh.children[5].rotation.x = -Math.sin(time) * 0.3; // Right leg
            });
            
            // Update player bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.position.addScaledVector(bullet.userData.direction, bullet.userData.speed);
                bullet.userData.distance += bullet.userData.speed;
                
                if (bullet.userData.distance > 100) {
                    scene.remove(bullet);
                    bullets.splice(i, 1);
                }
            }
            
            // Update enemy bullets
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const bullet = enemyBullets[i];
                bullet.position.addScaledVector(bullet.userData.direction, bullet.userData.speed);
                bullet.userData.distance += bullet.userData.speed;
                
                // Check if hits player
                if (bullet.position.distanceTo(camera.position) < 1) {
                    takeDamage(10);
                    scene.remove(bullet);
                    enemyBullets.splice(i, 1);
                    continue;
                }
                
                if (bullet.userData.distance > 80) {
                    scene.remove(bullet);
                    enemyBullets.splice(i, 1);
                }
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }
        
        function startGame() {
            document.getElementById('blocker').style.display = 'none';
            document.body.requestPointerLock();
            gameStarted = true;
            spawnWave();
        }
        
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement !== document.body && gameStarted && health > 0) {
                // Paused
            }
        });
        
        init();
        animate();
    </script>
</body>
</html>
