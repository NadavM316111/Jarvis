
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Georgia, serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
            box-sizing: border-box;
        }
        .quote-container {
            text-align: center;
            max-width: 600px;
        }
        .quote {
            font-size: 24px;
            line-height: 1.6;
            font-style: italic;
            margin-bottom: 30px;
        }
        .author {
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="quote-container">
        <p class="quote">"Your time is limited, don't waste it living someone else's life. Don't be trapped by dogma — which is living with the results of other people's thinking."</p>
        <p class="author">— Steve Jobs</p>
    </div>
</body>
</html>
