
<!DOCTYPE html>
<html>
<head>
<style>
  body {
    font-family: Georgia, serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    padding: 40px;
    box-sizing: border-box;
  }
  .quote-container {
    text-align: center;
    max-width: 600px;
  }
  .quote {
    font-size: 28px;
    font-style: italic;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .author {
    font-size: 18px;
    font-weight: bold;
  }
</style>
</head>
<body>
  <div class="quote-container">
    <div class="quote">"The only way to do great work is to love what you do."</div>
    <div class="author">— Steve Jobs</div>
  </div>
</body>
</html>
